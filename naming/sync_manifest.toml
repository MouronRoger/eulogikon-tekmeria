# EuKoine synchronising set — the synchronising artefacts pushed byte-identical to members from their canonical copy at the hub.
#
# This table IS the definition of the synchronising set. The sync tool iterates from
# these declared keys; it NEVER discovers artefacts or repos by a filesystem glob
# (EKDP-016 / ROT.md A5). A file under .eukoine/ not listed here is a finding, not an
# auto-target. Membership is an owner decision (EKDP-027).
#
# Per the 2026-06-26 ruling: the hub PUSHES the shared-law document set and the
# sync-protection enforcement down to members (byte-identical). It does NOT push any
# member's own rot/cut doctrine — the three cuts are converging, but convergence is a
# deliberate owner-gated motion, not an auto-sync (EKDP-031).

# The canonical hub. Its `name` is the hub's directory name; the sync/lock tools
# resolve it from any repo (self when run in the hub, else the sibling of that
# name — override with the EUKOINE_HUB env var). Mirror paths below are resolved
# relative to the resolved hub root, so the unlock/sync/relock cycle is drivable
# from every family repo, not only the hub.
[hub]
name = "eukoine"

[mirrors]
eulogikon = "../eulogikon"
EuGraphikon = "../EuGraphikon"
EuMorphikon = "../EuMorphikon"
eulogikon-semeia = "../eulogikon-semeia"
eulogikon_grid = "../eulogikon_grid"

