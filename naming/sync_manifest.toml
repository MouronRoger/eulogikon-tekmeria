# ── Greek-fold Python authority — the ONE definition, vendored byte-identical ─
# greek_normalizer.py (lemma_foldkey + canonical_lemma) is the sole Python fold
# authority (STANDARDS.md §2a). Vendored byte-identical into each member so no
# consumer reaches across `../eukoine` at runtime; the fold guard exempts the
# authority at this path in every repo, and `sync verify` proves the copy equals
# the hub. Self-contained (stdlib only, no file I/O).
[[artefacts]]
path = "tooling/normalization/greek_normalizer.py"
kind = "binding"
locked = false
targets = ["eulogikon", "EuGraphikon", "EuMorphikon", "eulogikon-semeia", "eulogikon_grid"]

# ── Greek-fold SQL binding — the canonical definition, single-sourced ─────────
# grc_fold is the SQL twin of lemma_foldkey (STANDARDS.md §2a). ONE writable
# definition lives at the hub; eulogikon loads it byte-identical via `\ir` from
# scripts/database/svf_rag_setup.sql instead of re-typing the body — so there is
# no second writable source that can drift. Only eulogikon deploys the shared-DB
# function, so it is the sole target.
[[artefacts]]
path = "tooling/normalization/grc_fold.sql"
kind = "binding"
locked = false
targets = ["eulogikon"]

# ── Greek-fold GO binding — the third twin (owner decision, 2026-07-14) ───────
# The SAME character rule as grc_fold.sql and greek_normalizer.py, in the language the
# substrate engines are written in. Admitted because TWO Go modules must fold IDENTICALLY
# — the keyed-window binding engine and the God-source decode reader — and a fold they
# each rolled themselves is precisely the fork this set exists to prevent.
#
# WHY IT MATTERS: a keyed window folded with the WORD-KEY grain (lemma_foldkey, which drops
# every non-letter) collapses two sites separated only by punctuation onto ONE folded
# position — "λόγος, δέ" and "λόγος δέ" both become "λογοσδε" — so the binder can no longer
# tell them apart and refuses a well-formed text. Binding folds with grc_fold: accent-blind,
# PUNCTUATION-PRESERVING. Same character rule, two grains.
#
# Proven at landing against a live database and the Python authority:
#   Go grc_fold == SQL grc_fold, and lettersOnly(GrcFold(t)) == lemma_foldkey(t), 18/18.
# The golden vectors travel with the twin (grc_fold_test.go). go.mod/go.sum are vendored so
# each consumer `replace`s to its local copy and compiles the hub's literal bytes — never a
# proxy fetch, never a second definition.
[[artefacts]]
path = "tooling/normalization/grc_fold.go"
kind = "binding"
locked = false
targets = ["eulogikon"]

[[artefacts]]
path = "tooling/normalization/grc_fold_test.go"
kind = "test"
locked = false
targets = ["eulogikon"]

[[artefacts]]
path = "tooling/normalization/go.mod"
kind = "binding"
locked = false
targets = ["eulogikon"]

[[artefacts]]
path = "tooling/normalization/go.sum"
kind = "binding"
locked = false
targets = ["eulogikon"]
