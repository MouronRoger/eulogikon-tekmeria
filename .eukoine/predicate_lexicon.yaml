  # ===========================================================================
  # E. Formal-logic universe binding (worked example over the text pipeline).
  #    These are the universe.entities of text_pipeline_formal_logic.yaml,
  #    registered so code identifiers and formal-logic symbols import from ONE
  #    registry — the same binding panoptikon enforces over code+logic alike.
  #    Pilot binds the TXT set only; other domains are follow-on.
  # ===========================================================================

  segment:
    signifier_form: [segment, Segment]
    canonical_referent: >-
      RETIRED as a BARE noun for the addressable unit of meaning (ADR-017). A brief
      interim proposal used `segment` on the premise that "SID = Segment ID" — retracted:
      the S in SID is SEMANTIC, not Segment (assign_sids.py performs "semantic phrase
      identification"; the formal logic says "a semantically-discrete passage"). The premise
      is void and the bare noun is wrong twice: free-floating (CDP-055, "segment of what?")
      AND mis-descriptive — "segment" implies an arbitrary slice, but the thing is a
      coherent unit of meaning (a clause; a word at finer grain) carved at semantic
      boundaries, which is the only reason it aligns Greek<->English 1:1.
    canonical_sense: >-
      Name the thing by its IDENTIFIER (ADR-017): a clause is its `SID`, a range its `RID`,
      a word a word-grain `SID` (the clause tail extended rightward). The identifier IS the
      entity-noun: name the unit by its `SID`, a range by its `RID` — never a separate bound
      noun, and never bare `segment` / `unit` / `portion` / `piece` / `span`. ONE referent across the JSON passage-array
      element, the `eulogikon.units` DB row, and the in-memory unit of meaning. The
      legacy_references `ref` / `unit_ref` are courtesy citations carried ON it, never its
      identity (CDP-054); an embedding chunk is the text an `RID` covers — address it by RID.
      The `units` stem is v5-eliminated (CDP-055), not renamed to `segments`.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [canonical, sid_assigned, translated, bilingual_paired, rendered]
    status: retired   # bare `segment` -> name by SID/RID; the identifier is the entity-noun (ADR-017)
    variant_senses:
      - {signifier: segment, referent: "the addressable unit of meaning", status: "retired bare -> SID (clause/word) / RID (range); the identifier is the entity-noun (ADR-017)"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: >-
        Bare `segment` retired (ADR-017): free-floating (CDP-055) and mis-descriptive of a
        semantic unit. The referent is named by its identifier (SID/RID); the identifier is
        the entity-noun.
    cites: [AX-TXT-02, INV-TXT-02, CDP-054, CDP-055]

  Unit:
    signifier_form: [Unit, unit]
    canonical_referent: >-
      RETIRED as a name for the addressable unit of meaning. The unit of meaning is named
      by its IDENTIFIER — its `SID` (a range its `RID`); the identifier is the entity-noun,
      no separate bound noun (ADR-017). "Unit" was a redundant generic wrapper (anti-synonymy retired,
      ADR-017). The entry is kept — with meaning —
      because EuGraphikon still imports `Unit` read-only; its import re-keys to the SID/RID
      identity at the coordinated v5 cutover (ADR-017 / `.eukoine/` §3.6).
    canonical_sense: >-
      The bare signifier "unit" was a generic wrapper over >=5 referents, and that wrapper
      hid the `ref` vs `unit_ref` grain split. Each is now named by what it is: the unit of
      meaning is named by its `SID` (a clause; a word at finer grain) / `RID` (a range) —
      the identifier is the entity-noun, never a separate bound noun and never a bare generic noun;
      `ref` / `unit_ref` are distinct legacy_references; an embedding chunk IS an RID. The
      live DB tables `units` / `units_index` and the column `unit_ref` retain the stem ONLY
      until the v5 cutover dissolves them (CDP-055-eliminated); `validation unit` stays qualified.
    canonical_term: SID   # ADR-017: name the unit of meaning by its SID/RID; the
                          # identifier is the entity-noun. DB `units` dissolves at v5.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [canonical, sid_assigned, translated, bilingual_paired, rendered]
    status: retired   # -> named by SID/RID; the identifier is the entity-noun (ADR-017)
    variant_senses:
      - {signifier: unit, referent: "the addressable unit of meaning", status: "retired -> named by SID (clause/word) / RID (range); the identifier is the entity-noun (ADR-017)"}
      - {signifier: unit, referent: "the eulogikon.units.ref locator", status: "distinct -> ref (legacy_reference)"}
      - {signifier: unit, referent: "the eulogikon.units_index.unit_ref locator", status: "distinct -> unit_ref (legacy_reference)"}
      - {signifier: unit, referent: "an embedding chunk", status: "it IS an RID (range of SIDs); EuGraphikon's embedding_unit/ordinal retire to RID"}
      - {signifier: unit, referent: "the work-JSON units[] array element — the source-edition display block (verse line | prose paragraph | speaker turn)", status: "retired -> render_block (a render-hint overlay over the RID it groups). NOT the unit of meaning: a prose block is MANY SIDs; the lexicon previously conflated this display grain with sense-1 (SID)."}
      - {signifier: "validation unit", referent: "the validation scope of the hyphenation checker (the phrase, not the word)", status: "distinct; qualify, never bare 'unit'"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: >-
        The six referents are split into their real names (the SID/RID identity, ref,
        unit_ref, RID, validation unit, and the display-block `render_block`); the bare
        wrapper "unit" — and bare "segment" (ADR-017) — are retired. The unit of meaning is
        named by its identifier; the display block by `render_block`. The only residue is the
        live DB/JSON `units` stem, held until the v5 cutover dissolves it.
      preferred_cure: Name the unit of meaning by its `SID`/`RID`; the identifier is the entity-noun. A `legacy_reference` for the citation string; `RID` for an embedding chunk; `render_block` for the source-edition display block (verse line | prose paragraph | speaker turn) the `units[]` array element carried. The v5 cutover eliminates `units`/`units_index`/`unit_ref` (CDP-055), not a rename to `segments`.
    cites: [AX-TXT-02, INV-TXT-02, CDP-051, CDP-055, AP-021]
    ban_order: 11
    ban_cell: "*unit* / *Unit* — and bare *segment* — as a name for the addressable unit of meaning (the thing a `SID` identifies): name it by its `SID` (a range by `RID`); the identifier is the entity-noun, no separate bound noun (**ADR-017**). The `units[]` work-JSON array element — the source-edition display block (verse line / prose paragraph / speaker turn) — is `render_block` (a render-hint overlay over its `RID`), **not** the unit of meaning. The live DB tables `units` / `units_index` and the column `unit_ref` retain the stem **only** until the v5 cutover dissolves them; `validation unit` stays qualified."
    replacement_cell: "**ADR-017** — name the unit of meaning by its `SID` / `RID`; the identifier is the entity-noun (the S in SID is Semantic)"

  render_block:
    signifier_form: render_block
    canonical_referent: >-
      A contiguous run of consecutive SIDs that a source edition presented as ONE
      typographic block — a verse line, a prose paragraph, or a speaker turn. A
      presentation (display) fact, not a semantic one. It is the real referent the v3
      `units[]` array element carried (one display row of the source edition; ~0.1% carry
      an internal newline — the block boundary IS the line/paragraph break).
    canonical_sense: >-
      The display grain — genre-polymorphic (line | paragraph | turn) and set by typography,
      so its size varies from ~7 words (a hexameter line) to hundreds (a paragraph); it is
      therefore NOT the machine grain. Three grains must stay distinct: the `SID` is the unit
      of meaning (a clause; the alignment/index atom); the `RID` is the embedding/retrieval
      granule (a range of SIDs); the `render_block` is the display grouping of 1+ SIDs. A
      `render_block` is NOT a fixed multiple of SIDs (a verse line ≈ 1 SID; a prose paragraph
      = many), which is exactly why it cannot double as the machine unit. In the cleaned
      (v5) substrate the `render_block` is NOT a row — the substrate is flat SIDs (the decided
      DB ontology: no row/paragraph/unit entity). It is a render-hint OVERLAY keyed to the
      `RID` it groups (CDP-054: structural labels are render-hints over the grid, never text
      rows). "Clean once, render many": the reading page reconstructs lines/paragraphs from
      `render_block` overlays over the flat spine. Eulogikon-owned (the readable face); not
      imported by EuGraphikon (the machine face does not render). Keyed to the shared `RID`.
    canonical_term: render_block
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent — the source-edition display block (line/paragraph/turn); a render-hint overlay over a RID, distinct from the SID (meaning) and RID (retrieval) grains. Baptised 2026-06-21 (owner-ratified), retiring the units[] display sense of `unit`."}
    cites: [CDP-051, CDP-054, CDP-055, ADR-017]

  SID:
    signifier_form: SID
    canonical_referent: "Semantic ID. The identity of one unit of meaning — a clause (the default grain) — work-locally unique, stable across the pipeline, and the sole cross-language alignment key (a Greek clause pairs with its English clause; an arbitrary slice never would). The finer word/token grain is a `TID` (Token ID, reserved — below). The S is Semantic, not Segment (assign_sids.py performs \"semantic phrase identification\"; ADR-017). The thing IS its SID; the identifier is the entity-noun — never a bare generic noun, never a separate bound noun."
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [sid_assigned, translated, bilingual_paired, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent; INV-TXT-02 names it the sole alignment key; ADR-017 fixes S = Semantic.}
    cites: [AX-TXT-02, INV-TXT-02, INV-TXT-03, ADR-017]

  RID:
    signifier_form: RID
    canonical_referent: >-
      The SORT (genus) of within-work range addressing: a range of SIDs (an inclusive
      range of single semantic spans), addressed as `wid-rid`; the range sibling of the
      point SID (the `wid-` prefix is the eul_wid, not a separate predicate). RID is a
      TYPE, not a single referent — an identity-kind, like "integer" is a type and not one
      number.
    canonical_sense: >-
      Within-work range addressing. RID is the genus; several KINDS of range coexist at one
      position with DIFFERENT coordinates and nest freely, so a bare `RID` cannot name "the
      range here" — that would be polysemy (CDP-051). Each kind is QUALIFIED (self-identifying
      naming, CDP-056): an `embedding_chunk` (the encoder-bounded, SID-aligned embedding
      granule), a `render_block` (the source-edition display block), a `legacy_reference`'s
      span (a citation). Each kind's IDENTITY **is** its RID — what is forbidden is giving a
      kind a SEPARATE KEY (do NOT mint `ordinal` or a serial id; the key is the RID), never
      naming the kind itself (the precedent is `render_block`, a named range-kind keyed by its
      RID). EuGraphikon's interim `embedding_unit`/`ordinal` retire to `embedding_chunk` keyed
      by its RID. Imported by EuGraphikon.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [sid_assigned, translated, bilingual_paired, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "RID is a sort (a range of SIDs); concrete range-kinds (embedding_chunk, render_block, legacy_reference span) are qualified, each keyed BY its RID — no bare-RID polysemy."}
    cites: [INV-WID-14, CDP-051, CDP-056]

  embedding_chunk:
    signifier_form: [embedding_chunk]
    canonical_referent: >-
      A KIND of RID: the encoder-bounded embedding granule — a contiguous range of SIDs
      selected by the embedding chunker, token-bounded to a band [n, 2n] and cut ONLY at SID
      boundaries (never mid-SID), tiling a work for the embedding store. Its IDENTITY is its
      RID (`{sid_start:sid_end}`). The text it covers is `text`; its
      vector is a `rid_embedding`.
    canonical_sense: >-
      The machine/retrieval granule — a named kind of RID, parallel to `render_block` (the
      display kind keyed by its RID). NOT every RID is an embedding_chunk: a citation
      (`legacy_reference` span) and a `render_block` are not. The chunker computes SID
      boundaries and chooses a cut that lands the token count in [n, 2n], so a chunk never
      splits a SID and may be smaller or larger than a `render_block` or a citation span,
      nesting freely with them. Identified BY its RID — it mints no separate key (the
      `ordinal` stand-in is retired). The band [n, 2n] is a chunker PARAMETER, not part of
      identity. Embedded by EuGraphikon (the machine face); the term is owned here as a
      RID-kind in the grid.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [sid_assigned, translated, bilingual_paired, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "A proper kind of RID (the encoder-bounded tiling granule), distinct from render_block (display) and a legacy_reference span (citation); identified by its RID, no separate key."}
    cites: [CDP-051, CDP-054, CDP-056, INV-WID-14]

  TID:
    signifier_form: [TID]
    canonical_referent: >-
      Token ID — the identity of one token (a word) inside a clause, the grain one level
      finer than the SID. RESERVED: named so the fine grain has a baptised home, but NOT
      currently minted or used. Addressed as the SID's clause tail extended rightward to
      the token (`abe-aca-aaa` clause -> `abe-aca-aaaa` 1st token); a 3-hyphen-part point
      whose last segment is 4+ letters (vs the 3-letter SID). Never a `wid` (ADR-017).
    canonical_sense: >-
      The fifth identifier kind (AID / WID / SID / TID / RID). Token-grain addressing for
      a future treebank / per-word layer; reserved now so nothing else claims the name and
      so the word grain is never mis-called a `wid`. When minted it is self-identifying
      like its siblings; until then it is a forward-declared point, not a live referent.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: local
    status: open-with-residue
    polysemy_debt:
      has_debt: false
      kind: reserved
      cause: One referent (the token/word point); reserved, not yet minted. Named to forbid the word being called a `wid` and to fix the grain below SID.
    cites: [INV-WID-14, ADR-017]

  Phase:
    signifier_form: Phase
    canonical_referent: "One of the lifecycle stages a Work passes through: raw, canonical, sid_assigned, translated, bilingual_paired, rendered."
    canonical_sense: "A strict total order (AX-TXT-03). The pipeline spine of this lexicon. No backward transition is valid."
    owner: {domain: TXT, file: docs/formal_logic/text_pipeline_formal_logic.yaml}
    pipeline_reach: [raw, canonical, sid_assigned, translated, bilingual_paired, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent; the spine itself.}
    cites: [AX-TXT-03, INV-TXT-06]

  RenderHint:
    signifier_form: [RenderHint, "render hint"]
    canonical_referent: >-
      Formal-logic name for a keyed overlay attachment (legacy_reference, render_block,
      speaker, marginalia, sigil, citing_author, latin_apparatus) — an attribute of
      SID/RID that informs rendering or apparatus but never participates in identity
      (§2.4). Canonical storage term: `overlay` / `overlays[]`.
    canonical_term: overlay
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "Formal-logic alias; canonical term is overlay (§2.4). INV-TXT-08 forbids overlay as a key."}
    cites: [AX-TXT-04, AX-TXT-06, INV-TXT-08]

  # ===========================================================================
  # F. The diagnostic seed — the genuinely-untreated live polysemes the
  #    exploration surfaced. Reconciliation reasoning: inventory_2026-06-10.md.
  #    Recurring finding: most resolve into vocabulary ALREADY baptised by the
  #    witness/identity work — the cure is to USE the precise term, not coin more.
  # ===========================================================================

  source:
    signifier_form: source
    canonical_referent: >-
      AMBIGUOUS in bare form. Carries four referents: data_source_file (input),
      comparison_edition (scar audit), citing_author (citing authority), and
      a bibliographic "source edition".
    owner: {domain: TXT, file: docs/governance/source_terminology.md}
    status: open-with-residue
    variant_senses:
      - {signifier: source, referent: "conversion input", status: "use data_source_file"}
      - {signifier: source, referent: "scar-audit edition", status: "use comparison_edition"}
      - {signifier: source, referent: "citing authority", status: "use citing_author"}
      - {signifier: source, referent: "a particular text edition (Jones vs Littré)", status: "use 'source edition' (qualified)"}
    polysemy_debt:
      has_debt: true
      kind: residual-collision
      cause: The witness sweep split three senses; bare "source" still appears unqualified in prose.
      preferred_cure: Always qualify — never ship bare "source" where one of the four precise terms applies.

  reference:
    signifier_form: [reference]
    canonical_referent: >-
      A citation into a standard EXTERNAL edition, kept only to communicate with the
      outside world (Stephanus, Bekker, Diels-Kranz, SVF, a source edition's
      book.line/section numbering). A derived SID-keyed overlay per CDP-054 — never our
      identity, never the lookup key. Genus: a {reference_scheme, reference_locus} pair.
    canonical_sense: >-
      ADR-014 cut this signifier to ONE referent. Internal addressing is the IDENTIFIER
      stack (eul_aid / eul_wid / sid / rid); a reference is the EXTERNAL courtesy
      citation we keep for interop. Distinct from citing_author (who quoted whom —
      an ancient reporter, not an edition locus) and from the legacy_references `ref` /
      `unit_ref` (the source-edition citation strings on a segment / index row).
      CDP-055 RESOLVED (2026-06-17): bare "reference" floats (reference of what?) and is
      RETIRED. The external standard-edition citation IS a `legacy_reference` — a reference
      TO a passage (SID / RID) in a foreign edition's scheme; there is no second referent.
      As an overlay kind (`overlay_kind = legacy_reference`) its parts are the qualified
      overlay columns: `overlay_scheme` (Stephanus / Bekker / DK /
      SVF), `overlay_value` (the value within the scheme, "327a"), and
      `overlay_anchor` (the folded-Greek context that locates it). The prior
      free-floating heads `reference` and `locus` are retired, nothing new coined beyond the
      `legacy_reference` overlay kind and its `overlay_*` columns.
    owner: {domain: TXT, file: docs/architecture/ADR-014-reference-names-external-citations-only.md}
    status: retired
    variant_senses:
      - {signifier: "reference key", referent: "eul_wid as identity", status: "retired -> identifier (eul_wid); §10 + ADR-014 §7"}
      - {signifier: "reference method", referent: "eul_wid as identity", status: "retired -> identifier; ADR-014 §7"}
      - {signifier: reference, referent: "the segment's source-edition citation string", status: "retired -> legacy_reference (ref/unit_ref); ADR-014 + ADR-017 + CDP-055"}
      - {signifier: reference, referent: "the external standard-edition citation (Stephanus / Bekker)", status: "retired -> legacy_reference (+ _scheme / _value / _anchor); CDP-055"}
      - {signifier: reference, referent: "who quoted whom in a fragment", status: "use citing_author"}
    polysemy_debt:
      has_debt: false
      kind: resolved
      cause: ADR-014 cut "reference" to external citation only; CDP-055 then retired the bare floating head entirely. The external citation is a `legacy_reference` (referent-binding), realised as an overlay kind decomposed into overlay_scheme / overlay_value / overlay_anchor.
    cites: [CDP-054, CDP-051, CDP-055]

  overlay_scheme:
    signifier_form: [overlay_scheme]
    canonical_referent: >-
      The named external citation system a legacy_reference overlay belongs to: Stephanus (Plato),
      Bekker (Aristotle), Diels-Kranz (Presocratics), SVF (Stoics), a source edition's
      book.line. "A Bekker is not a Stephanus." A `legacy_reference`-kind overlay column.
    canonical_sense: >-
      The scheme of a legacy_reference overlay; `overlay_`-qualified, its referent supplied by
      `overlay_kind = legacy_reference` at row grain (CDP-056 declared-polymorphic exception).
      Prior spellings `scheme_hint` (campaign code), `reference_scheme`, and the bare
      per-field form are retired into this name. Qualify outside the
      domain — never let bare "scheme" denote it.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent; the scheme of a legacy_reference overlay.}
    cites: [CDP-054, CDP-055, CDP-056]

  overlay_value:
    signifier_form: [overlay_value]
    canonical_referent: >-
      The value of a legacy_reference overlay within its scheme: "17a" (Stephanus), "859b" (Bekker),
      "B17" (Diels-Kranz). An {overlay_scheme, overlay_value} pair on a
      `legacy_reference`-kind overlay points at a passage (SID / RID).
    canonical_sense: >-
      `overlay_`-qualified; its referent is supplied by `overlay_kind` at row grain (CDP-056
      declared-polymorphic exception). NOT `_id`: "ID" is reserved for the identifier stack
      (AID / WID / SID / TID / RID), which is identity; a legacy_reference is NEVER identity
      and never a lookup key (CDP-054). The prior free-floating heads `locus` / `reference_locus`
      and the bare per-field form are retired into this name; campaign code
      spelling `locus` aligns to `overlay_value`.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent; the scheme-specific value of a legacy_reference overlay.}
    cites: [CDP-054, CDP-055, CDP-056]

  locus:
    signifier_form: [locus, reference_locus]
    canonical_referent: "RETIRED. A free-floating head (CDP-055 — 'a locus of what?')."
    canonical_sense: >-
      Retired into `overlay_value` (the value of a legacy_reference overlay within its
      scheme). "locus" named a slot, not a referent; the value points at a passage (SID /
      RID) and belongs to the `legacy_reference` overlay kind.
    owner: {domain: TXT, file: docs/architecture/ADR-014-reference-names-external-citations-only.md}
    status: retired
    polysemy_debt: {has_debt: false, kind: resolved, cause: Free-floating head retired to overlay_value (CDP-055).}
    cites: [CDP-054, CDP-055]

  overlay_anchor:
    signifier_form: [overlay_anchor]
    canonical_referent: >-
      The folded-Greek context either side of a legacy_reference overlay's boundary, used to LOCATE
      the legacy_reference in the canonical text by content (CDP-054 — the text is the index),
      not by character offset or sid position.
    canonical_sense: >-
      The content-address of a legacy_reference overlay; `overlay_`-qualified, its referent
      supplied by `overlay_kind` at row grain (CDP-056 declared-polymorphic exception).
      Prior spellings `anchor` (campaign code), `reference_anchor`, and the bare
      per-field form retire into this name.
      Qualify outside the domain — never let bare "anchor" denote it (cf. the metaphorical
      "anchor" in one_system.md).
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent; the content-address of a legacy_reference.}
    cites: [CDP-054, CDP-055]

  # --- keyed_window: the THING the keyed_window_binding act lands ----------------
  # Baptised 2026-07-13. The system has exactly ONE sub-SID addressing mechanism, and
  # it had four names: `keyed_window` (review-point record), `overlay_window` (v5),
  # "content window" (CDP-062 §62), "context window" (spec prose). That is synonymy,
  # not four referents — the bijection is restored by naming the thing ONCE here.
  # Only TWO entries survive in this family, and they are a thing/act pair:
  #   keyed_window          — the THING you land (this entry)
  #   keyed_window_binding  — the ACT that lands it (engine/bind.go `Locate`)
  # `overlay_window` is NOT a synonym: it is this referent carried on an overlay row —
  # head `window` conserved, `overlay_` qualifier riding in front (CDP-051), exactly as
  # overlay_value / overlay_class do. Genuinely distinct neighbours, held apart:
  # `overlay_lift_fold` (the FOLD it is matched under) and CDP-062's CROSS-CHECK (the
  # VERIFY act performed ON a keyed window — a different act from locating one).
  keyed_window:
    signifier_form: [keyed_window, KWB]
    canonical_referent: >-
      A unique window of clean Greek that addresses a site BY CONTENT rather than by position —
      the system's ONE content-address, at every grain. Landed on every substrate modification and
      every decode finding; carried on a v5 `sigil` as `overlay_window` (the mark in place, e.g.
      "Τάχα δέ [γε] ἐπειδὰν"); shaped as ⟨before_fold, after_fold, cut, keyed_window_hash⟩ in a
      review-point record; and the thing that HOLDS A SID IN PLACE — a settled SID is pinned to its
      Greek by its keyed window, not by an opaque key that must be re-issued whenever a boundary moves.
    canonical_sense: >-
      Editorial marks and language boundaries sit BELOW token grain, so they can anchor neither at
      SID/RID granularity nor at a character offset — an offset does not survive re-segmentation, a
      content-addressed window does (CDP-054: the text is the index). ONE mechanism, TWO uses: it
      locates a FINDING (which symbol the decoder broke on, and where) and it anchors an OVERLAY
      (where an editorial mark sits). A decoder that cannot land a keyed window can neither report an
      investigable failure (INV-TXT-14 addressability) nor emit conformant v5 — which is why the
      keyed window is upstream of the substrate itself, not an observability afterthought.
      The thing/act pair is the only split in this family: you LAND a `keyed_window`; the act that
      lands it is `keyed_window_binding`. Substituting the act for the thing makes the sentence
      circular ("anchored by a KWB, located by the keyed-window binding") — that circularity is the
      test, and it is how the synonymy was caught.
    owner: {domain: TXT, file: cluster-keyed-window-binding/PROGRAM.md}
    pipeline_reach: [raw, canonical, sid_assigned]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent, one signifier. The ACT (keyed_window_binding) is the only sibling; overlay_window is this referent under a conserved head."}
    retired_synonyms:
      - {signifier: content window, referent: "the keyed window", status: "retired -> keyed_window. Survives in CANONICAL_DESIGN_PRINCIPLES §62's title ('the universal content-window cross-check') and in .eukoine SQL comment ('the sub-token content-window') — both are the same referent under a retired name."}
      - {signifier: context window, referent: "the keyed window", status: "retired -> keyed_window. Coined synonym, no other domain use."}
    notes:
      - "`overlay_window` (v5 sigil field) is NOT retired and NOT a synonym — it is this referent under the conserved head `window` with an `overlay_` qualifier (CDP-051). Owned by .eukoine (CDP-057): any rename goes through the authorised sync cycle, never a mirror hand-edit."
      - "CDP-062's CROSS-CHECK (verify) is a different ACT from keyed_window_binding (locate). Both operate on a keyed_window; neither is a synonym for it."
    cites: [CDP-050, CDP-051, CDP-054, CDP-057, CDP-062, INV-TXT-13, INV-TXT-14]

  # --- the sigil class set: what an editorial mark SAYS about the text -----------
  # Baptised 2026-07-13. The whole set (`SIGIL_CLASSES_V5`, src/core/json_schema.py:333;
  # `.eukoine` §2.4) was live in the schema and REGISTERED NOWHERE — an AP-023 gap across
  # four signifiers, not one. Recorded together because they are one closed classifier and
  # only make sense against each other.
  #
  # Each names the CONDITION OF THE TEXT — what the editor's mark CLAIMS. None is an
  # operation, and none may be read as one: the canonical Greek is inviolable (CDP-042),
  # no overlay removes a letter, and `overlay_display: suppress` hides the MARK, never the
  # text. The distinction that matters downstream is EVIDENTIAL: is this Greek attested, or
  # is it the editor's conjecture? The corpus-attestation flagger depends on the answer.
  sigil_class:
    signifier_form: [overlay_class]     # on an `overlay_kind: sigil` row
    canonical_referent: >-
      The closed classifier of what an editorial mark asserts about a span of text:
      `supplement` (the editor SUPPLIED it — absent from the witnesses, a conjecture),
      `interpolation` (a later hand INSERTED it — present in the witnesses, but judged
      not authorial), `crux` (the text is CORRUPT and undecidable), `lacuna` (the text is
      LOST). Attested: interpolation and crux YES; supplement and lacuna NO.
    canonical_sense: >-
      Every member is a NOUN naming the state of the text, never a verb naming an act on
      it (CDP-051 §7.4: no mechanism-verb head). `supplement`, `interpolation`, `crux`,
      `lacuna` are naturalised English and STAY under the de-Latinization rule
      (.eukoine §3.6: "Naturalised English with Latin roots — fragment, edition, author —
      stays"); the rule targets words that do not say what the thing IS, not Latin roots.
      Greek jargon (`athetesis`) is REJECTED for the same reason `recension` and
      `testimonium` were: it obscures.
      NOTE the papyrological/text-critical INVERSION: `[X]` marks a RESTORATION in a
      papyrus edition (not attested) and an INTERPOLATION in a literary one (attested but
      doubted). The class cannot be read off the bracket glyph; `bracket_convention` is a
      property of the work-edition and must be declared (cluster_v5_json/v5_text_spine_spec.md §7.3).
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [canonical, sid_assigned, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One closed classifier; four disjoint conditions of the text."}
    retired_synonyms:
      - signifier: deletion
        referent: "the sigil class for text a later hand inserted"
        status: >-
          retired -> interpolation. TWO faults. (1) POLYSEMY, and a dangerous one: `deletion`
          is ALREADY BOUND in this project to CDP-042 — destroying a work's canonical JSON,
          "the most severe class of violation in the project". One signifier, two referents,
          one of them irrecoverable data loss. (2) PREDICATE-AS-HEAD (AP-023): it names a
          MACHINE OPERATION where its three siblings name CONDITIONS OF THE TEXT. Nothing is
          deleted — `.eukoine` §2.4 says of `[X]` "X PRESENT". The word misled a reader in a
          single pass into asserting that restorations would be destroyed.
          `interpolation` is the term `.eukoine`'s own prose already uses ("suspected
          interpolation") — an IMPORT, not a coin.
          PENDING THE CDP-057 SYNC -- `.eukoine` still declares `deletion`, so eulogikon's
          SIGIL_CLASSES_V5 / example / tests stay conformant with it until the canonical copy
          is amended and re-synced. Do not rename them locally first.
    cites: [CDP-042, CDP-050, CDP-051, CDP-054, CDP-057, AP-023]

  # --- structure_card: THE per-work answer to "what kind of work is this?" -------
  # Baptised 2026-07-13. The cards are 4,059 committed JSONs — one per canonical work —
  # and their own README calls them "the Bletchley index card… the binding contract
  # between classification, God-source column geometry, and human-face wrap/keep"
  # (CDP-065). They were REGISTERED NOWHERE. `display_disposition` (the RENDERING half)
  # had an entry; `classification` (the half that says what the work IS) had none — so
  # every front door outside the god-sources cluster was silent about the corpus's own
  # genre vocabulary, and an agent asking "is this a papyrus or a manuscript?" had no
  # canonical term to reach for and went hunting in an empty `source` block instead.
  structure_card:
    signifier_form: [structure_card]
    canonical_referent: >-
      The persistent per-work JSON in cluster-god-sources-xml/decode_god_sources_xml_file_structure/,
      named identically to its canonical work. Holds `classification` (what the work IS),
      `display_disposition` (how it renders), `god_source` (citation scheme, `col_span`, and
      **`column_grid` — the authored per-ordinal column declaration**, categorization before decode),
      `reconciliation`, `discovery_log`, `render_blocks`, and `decode_publication`. NOT build-time
      ephemera: a committed hard copy, read by the decoder and by projection, written back by the
      decode/confirm scripts.
    canonical_sense: >-
      It is THE STARTING POINT — the first thing to read about a work, before its text, its source,
      or its provenance. Knowledge corrects the source when they disagree (`classification.record_authority: "card"`);
      discordance is a FINDING, never a silent overwrite. Read it whenever the question is "what kind
      of thing is this work?" — genre, **column declaration**, layout, wrap/keep, citation grid, or the editorial conventions
      of its edition. It is a CORPUS fact that the decode programme happens to record, not a decode
      artefact: consumers outside the god-sources cluster (v5 projection, attestation, publication)
      are first-class readers.
    owner: {domain: TXT, file: cluster-god-sources-xml/decode_god_sources_xml_file_structure/README.md}
    pipeline_reach: [raw, canonical, sid_assigned, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One artefact, one per work, one home."}
    cites: [CDP-065, CDP-054, CDP-059]

  # --- classification: the genre axes. `structure` is the load-bearing one. --------
  classification:
    signifier_form: [classification, form_family, form_type, structure]
    canonical_referent: >-
      The genre block on a structure_card. THREE axes, each a closed or curated list:
      `form_family` — the coarse kind (treatise, drama, history, oratory, commentary, compilation,
      lyric, biography, …; ~20 values, ADR-018).
      `form_type` — the fine kind (theology, tragedy, …; ~520 curated values).
      `structure` — HOW THE TEXT SITS ON THE PAGE: `prose` | `fragmentary` | `verse` |
      `prose-dialogue` | `verse-drama`. Five values, and the only one downstream logic branches on.
      Plus `confidence` and `held` — the fail-loud pair: low confidence or `held: true` means REFER,
      never guess (AP-029).
    canonical_sense: >-
      `structure` is load-bearing far beyond genre display. It decides (a) HUMAN-FACE WRAP/KEEP —
      prose flows, verse keeps its lines (`display_disposition`, CDP-065); (b) THE SID BOUNDARY
      SIGNAL — a fragmentary work has no clauses, so its SIDs are scraps delimited by lacunae, not by
      punctuation (v5 text-spine spec §5); and (c) THE EDITORIAL BRACKET CONVENTION — in a
      `fragmentary` work `[X]` is text the editor RESTORED into a hole (a conjecture, NOT attested);
      elsewhere `[X]` is a suspected interpolation (attested, but doubted). Read the bracket by the
      wrong convention and the attestation flagger learns a modern editor's guesses as if they were
      transmitted Greek. NOT derivable from the title: Philodemus's `On Piety` is a Herculaneum
      papyrus and says so nowhere but here.
    owner: {domain: TXT, file: cluster-god-sources-xml/decode_god_sources_xml_file_structure/README.md}
    pipeline_reach: [raw, canonical, sid_assigned, rendered]
    status: aligned
    polysemy_debt:
      has_debt: true
      kind: parallel_scheme
      cause: >-
        THREE classifications of a work exist and nothing reconciles them: the DB's `domain` + `format`
        (coarse two-axis), the card's `form_family` + `form_type` + `structure` (fine; ADR-018 backfilled
        them FROM `format × domain`, then curated), and a third `format` field on the canonical work JSON.
        The card is the authority (`record_authority: "card"`; "knowledge corrects the source"), so the
        other two are derived views — but that is not written down anywhere and no check enforces it.
        Reconciliation is a named follow-on.
    cites: [CDP-065, ADR-018, AP-029]

  # --- display_disposition: flow/keep on the structure card (CDP-065) ------------
  display_disposition:
    signifier_form: display_disposition
    canonical_referent: >-
      Per-work human-face wrap/keep on the persistent structure card (CDP-065): flow vs
      keep; decoder_confirmation cross-checked against XML — hard copy, not build-time ephemeral.
    canonical_sense: >-
      Operational spec: cluster-god-sources-xml/decode_god_sources_xml_file_structure/README.md
    owner: {domain: TXT, file: cluster-god-sources-xml/decode_god_sources_xml_file_structure/README.md}
    pipeline_reach: [raw, canonical, rendered]
    status: aligned
    cites: [CDP-065, CDP-054]

  # --- column_grid: the God-source table geometry — position IS meaning ----------
  column_grid:
    signifier_form: [column_grid, column_geometry]
    canonical_referent: >-
      The God-source render's table geometry, CONSUMED as the CSV frame
      (russian_columns_csv, CDP-066; resolved_source_column_model_spec.md §0–§1):
      per-ordinal permitted role sets whose sole role authority is the structure
      card's `god_source.column_grid`. Reference and body cells carry the same
      empty class; the card declares which ordinals may carry which roles. Grid
      width authority is the CSV `grid_width` — never `col_span`-from-crossref.
    canonical_sense: >-
      INVIOLABLE (spec §0): categorization precedes decode. The card's column
      declaration is primary; legend markup types within the declared role. Geometry
      is never stripped or inferred at runtime. Sovereign render: russian_source
      (restructured_v18 is flattened — CDP-060). Readable provenance face of the
      same geometry: russian_columns_csv.
    owner: {domain: TXT, file: cluster-god-sources-xml/decode_god_sources_central_plan/resolved_source_column_model_spec.md}
    pipeline_reach: [raw, canonical, sid_assigned, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "Two signifier forms, one referent, one spec owner; the grid is consumed, never derived (v6 law)."}
    cites: [CDP-060, CDP-054, CDP-065, CDP-066]

  russian_columns_csv:
    signifier_form: [russian_columns_csv]
    canonical_referent: >-
      The provenance shelf `z_no_git/provenance/russian_columns_csv/`: per-work occupancy-
      expanded CSV of the russian_source column grid, PRIOR to the Russian HTML for grid
      identification (owner directive). Digest-bound to russian HTML bytes; writers per
      source lane: decode_export_column_grid_evidence.py (russian renders, sole segmenter)
      and decode_repair_f1k_column_grid.py (the f1k/TEI repair lane).
    canonical_sense: >-
      CDP-066 / §66: INVIOLABLE readable basis of the column grid — the grid the decode
      CONSUMES (csv_frame_contract.md), never matches, never re-derives; not var/ scratch;
      not optional. The HTML does not present the grid as inspectable; open the CSV to
      identify column contents. Falsifier AP-031. Not a synonym of column_grid (the
      geometry/role law) nor of csv_frame (the coordinate system it carries).
    owner: {domain: TXT, file: z_no_git/provenance/russian_columns_csv/README.md}
    pipeline_reach: [raw]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "Shelf name 1:1 with path; cites column_grid for the geometry law."}
    cites: [CDP-066, CDP-060, CDP-049, AP-031]

  csv_grid:
    signifier_form: [csv_grid, cluster_god_sources_v6_csv_grid]
    canonical_referent: >-
      The CSV-grid-first program: the discipline in which russian_columns_csv is consumed
      as the sole grid derivation (the law: "the decoder decodes the markup; it does not
      decode the grid, because we already have the grid"). Home
      cluster_god_sources_v6_csv_grid/ (owner-baptised name); ordering authority its
      PROGRAM.md; wave ids csv_grid_w0_shelf … csv_grid_w7_faces_and_closure.
    canonical_sense: >-
      Head conserved from the owner's cluster baptism; the wave qualifiers ride behind it.
      Not a synonym of russian_columns_csv (the shelf) nor column_grid (the geometry law) —
      the program that consumes the former under the latter.
    owner: {domain: TXT, file: cluster_god_sources_v6_csv_grid/PROGRAM.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "Coined at cluster foundation with the wave namespace bound 1:1 to graph nodes."}
    cites: [CDP-066, CDP-051, CDP-006]

  csv_frame:
    signifier_form: [csv_frame, FrameCell, frame]
    canonical_referent: >-
      The coordinate system carried by russian_columns_csv: 0-based source-<tr> rows
      (empty rows count — H12) × occupancy ordinals, with per-cell byte spans
      [byte_start, byte_end) into the raw render. Contract:
      cluster_god_sources_v6_csv_grid/csv_frame_contract.md. Go consumer:
      decode_god_sources_xml_reader/source/frame.go (FrameCell/Frame/ParseFrame).
    canonical_sense: >-
      The frame is CONSUMED: the exporter is the only segmenter per source lane; the reader
      slices byte spans and never detects a boundary (PREVENTION_BARRAGE M3/M4). grid_row ==
      origin_row == god_source_row — one shared frame, no reconciliation map. `frame` as a
      bare Go package name is this referent inside the reader module only.
    owner: {domain: TXT, file: cluster_god_sources_v6_csv_grid/csv_frame_contract.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent across CSV fields, Go types, and contract; byte-span fields conserved verbatim across the boundary."}
    cites: [CDP-066, CDP-064, CDP-037]

  column_grid_wc:
    status_note: >-
      RETIRED (owner ruling: the markup-first wave series cannot exist in the CSV-grid
      universe). The wave ids below are banned tokens in live schedules and the v6 tree —
      enforced by cluster_god_sources_v6_csv_grid/guardians/check_csv_grid_schedule.py.
      The live wave namespace is csv_grid (see the csv_grid entry). This entry remains as
      the retired-signifier record (a banned token is a status: retired entry, CDP-050).
    signifier_form: [WC1, WC2, WC3, column_grid_wc]
    canonical_referent: >-
      The column-declaration cure spine of the god-sources program (year zero): WC1
      (cards-first applicator — bumps legacy W1), W8 corpus card curation, W9
      cards-first cut, WC2 (column-realize cell text by card role — bumps legacy W2),
      WC3 (overlay lift within card-permitted roles — year-zero id of the former
      column_grid_w3_overlay_lift). Graph nodes column_grid_wc1,
      column_grid_w8_corpus_card_curation, column_grid_w9_cards_first_cut,
      column_grid_wc2, column_grid_wc3 in
      cluster_god_sources_v6_csv_grid/resolved_source_task_graph.yaml (sole status owner).
    canonical_sense: >
      WC = Wave Column (cards-first / column-declaration series). Not a synonym of
      column_grid itself — the wave ids that schedule application of column_grid.
      Head conserved: column_grid; WC* are campaign wave qualifiers. W8/W9 keep the
      names the dual-face invariants baptised as wave owners (S1/S3/M3/H6).
      Left-behind waves 0–6a are archived schedule, never live
      (cluster_god_sources_xml_inversion.md §0.3; guardian
      cluster_god_sources_v6_csv_grid/guardians/check_csv_grid_schedule.py).
    owner: {domain: TXT, file: cluster-god-sources-xml/archive/decode_god_sources_xml_campaigns/decode_column_grid/campaign.yaml}
    status: retired
    polysemy_debt: {has_debt: false, kind: clean, cause: "Wave ids bound 1:1 to graph nodes; legacy W1/W2 superseded, not deleted from the archived record."}
    cites: [CDP-051, CDP-060]

  # --- mechanical_ceiling: the boundary between formatting and sense (CDP-064) ----
  mechanical_ceiling:
    signifier_form: [mechanical_ceiling, decoder_ceiling]
    canonical_referent: >-
      Limit of context-blind mechanical layers on transmitted Greek (CDP-064 §64):
      structure and formatting from markup only; sense-dependent repair is outside.
    canonical_sense: >-
      Falsifier AP-028. Full rule in CANONICAL_DESIGN_PRINCIPLES_EULOGIKON.md §64 and
      resolved_source_dual_face_telos.md §4 — cite, do not restate.
    owner: {domain: TXT, file: CANONICAL_DESIGN_PRINCIPLES_EULOGIKON.md}
    pipeline_reach: [raw, canonical]
    status: aligned
    cites: [CDP-064, AP-028]

  # --- keyed_window_binding: the ACT that consumes overlay_anchor -----------------
  # Baptised 2026-07-09. The retrieval/projection act was previously code-only
  # (`overlay_lift.locate` + `content_anchor.find_window`) with no domain term. Held
  # apart from its three neighbours to keep the bijection: it is NOT overlay_anchor
  # (the key), NOT overlay_lift_fold (the fold), NOT CDP-062's cross-check (verify).
  keyed_window_binding:
    signifier_form: [keyed_window_binding]
    canonical_referent: >-
      The content-addressed act that LOCATES a folded-Greek boundary window
      (`overlay_anchor`) in the bare canonical body IN ITS SEQUENCE, BETWEEN ITS
      NEIGHBOURS, binding a God-source coordinate (a legacy_reference / speaker /
      title / line / sigil) to its position — unit+offset now, RID/SID at settle.
      A window is NEVER located alone: the grid is ONE order-preserving assignment
      solved whole, FORCED exactly where the earliest and latest valid orderings agree
      (v5_text_spine_spec.md §4). Owner: `cluster-keyed-window-binding/engine/grid.go`
      (`BindGrid`) — the single authority for the binding invariant; `engine/match.go`
      (`Bind`) reports one window's own evidence and never chooses among candidates.
    canonical_sense: >-
      The retrieval/projection half of the content-window method: given the folded
      Greek around a boundary, find where that junction falls in a work's body —
      edition-independent (the text is the index, CDP-054), order-forced by the
      SEQUENCE, self-identifying residue (unique / resolved / ambiguous /
      undetermined / not_found). `resolved` = a recurring key pinned by the ORDERING;
      `undetermined` = the ordering does not force it, so the engine REFUSES and names
      the site (CDP-037), never guessing. The retired `monotonic floor` bounded the
      search only from BELOW and so bound a corrupted site silently to any later
      recurrence and called it success (measured: one altered character displaced an
      Iliad boundary 56,413 characters and returned `resolved`); `out_of_order` was its
      artifact and retires with it. THE FOLD IS `grc_fold` — accent-blind and
      PUNCTUATION-PRESERVING; `lemma_foldkey` drops every non-letter and so collapses
      two sites separated only by punctuation onto one folded position.
      Held distinct from three neighbours to keep the bijection:
      `overlay_anchor` is the KEY it consumes, `overlay_lift_fold` is the FOLD it
      uses, and CDP-062's content-window CROSS-CHECK (the doctrine + decode-QA
      corroboration) is the VERIFICATION act — this names the BINDING act only, never a
      synonym for any of them. Head is `window` (conserved across `find_window` /
      `overlay_window`); "…lookup" is rejected (CDP-051 §7.4 mechanism-verb-as-head;
      CDP-054 reserves "lookup" for text → reference).
    owner: {domain: TXT, file: cluster-keyed-window-binding/engine/bind.go}
    pipeline_reach: [canonical, sid_assigned]
    used_at:
      - {path: cluster-keyed-window-binding/engine/bind.go, role: owner}
      - {path: cluster-keyed-window-binding/engine/match.go, role: primitive}
      - {path: cluster-keyed-window-binding/port/keyed_window_port.go, role: port}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Fresh baptism of a previously code-only, unnamed act; distinct from overlay_anchor / overlay_lift_fold / CDP-062 cross-check.}
    cites: [CDP-051, CDP-054, CDP-060, CDP-061, CDP-062]

  # --- keyed_window_hash: the join key across the LLM cold seam ------------------
  # Baptised 2026-07-09 alongside keyed_window_binding. Names the STABLE IDENTITY of a
  # keyed window across the deterministic-engine ↔ advisory-LLM seam; distinct from the
  # binding ACT (keyed_window_binding) and the window KEY (overlay_anchor).
  keyed_window_hash:
    signifier_form: [keyed_window_hash]
    canonical_referent: >-
      The content-address of a keyed window: unkeyed BLAKE2s-256 (lowercase hex) over
      `utf8(before_fold) ‖ utf8(after_fold) ‖ ascii(decimal(cut))`, where `‖` is U+2016.
      It is the join key binding an LLM boundary/semantic verdict to the window it
      judges; on replay a hash mismatch means the decode output shifted, so the verdict
      is stale and the window is HELD (never applied — CDP-037).
    canonical_sense: >-
      The eul_wid-stable identity of a keyed window until v5 `sid`s settle (it re-keys
      mechanically to `sid` later). Single owner of the byte-exact recipe: the
      keyed-window-binding doctrine (§5); both the Go engine and the Python Judge compute
      the documented twin. The seam CODE (the WindowHash implementation) lands with the
      LLM-cluster effort; this names the contract.
    owner: {domain: TXT, file: cluster-keyed-window-binding/doctrine/keyed_window_binding_doctrine.md}
    pipeline_reach: [canonical, sid_assigned]
    used_at:
      - {path: cluster-keyed-window-binding/doctrine/keyed_window_binding_doctrine.md, role: owner}
      - {path: cluster-llm-boundary-semantic/PROGRAM.md, role: cite-only}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Fresh baptism; contract-only until the LLM-cluster effort implements the seam code.}
    cites: [CDP-037, CDP-045, CDP-051, CDP-062]

  # --- legacy_reference (the genus) and its two distinct members ----------------
  # ADR-014 first coined a single `passage_label` over [ref, unit_ref]; that entry was
  # RETIRED (it was both a synonym for `ref` and a false merge of two referents).
  # schema_v2.sql adjudicates: `eulogikon.units.ref` and `eulogikon.units_index.unit_ref`
  # are DISTINCT — different tables, keys, constraints, and text (raw vs normalized).
  # The genus was briefly `legacy_locator` ("locator" floats, CDP-055); the owner's
  # canonical term is `legacy_reference` (a legacy reference TO a passage).
  legacy_reference:
    signifier_form: [legacy_reference, legacy_locator]
    canonical_referent: >-
      The genus of the legacy citation strings carried on a segment as an overlay
      (e.g. "1.1", "327a", "cod. 212") — each a legacy reference TO a passage; courtesy
      metadata, NEVER identity (identity is the SID/RID; CDP-054). Two distinct members:
      `ref` and `unit_ref` (below).
    canonical_sense: >-
      Referent-pointing per CDP-055: a `legacy_reference` is a reference TO a passage
      (a `segment` / `RID`) in a foreign edition's scheme — the head binds its referent,
      unlike the free-floating `reference` / `locator` / `ref`. It heads a family (external
      standard-edition reconciliation, 2026-06-17): a legacy_reference overlay decomposes as
      {`overlay_scheme` (Stephanus / Bekker / DK / SVF), `overlay_value`
      (the value "327a")} and is located in the text by `overlay_anchor`; the bare
      heads `reference` and `locus` are retired into this family. A RenderHint-class
      attribute (informs citation, never identity). Works are keyed by `eul_wid`,
      passages by `SID` / `RID` — **never** by a legacy_reference; and **SID/RID look up
      legacy_references (text -> reference, CDP-054 Index Inversion), never the reverse**.
      We do NOT segment by legacy references (CDP-055): a legacy_reference is an overlay
      keyed to the grid, never a segmentation key. The prior name `legacy_locator` is
      retired into this entry; today the grid is not minted, so these are the only
      passage citations and they are dirty (variable grain, gaps, one-scheme-only works).
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "Genus with two named members (ref, unit_ref); a legacy_reference binds its referent (a passage), CDP-055-compliant; supersedes the floating `legacy_locator`."}
    cites: [CDP-054, CDP-055]

  ref:
    signifier_form: [ref]
    canonical_referent: >-
      A `legacy_reference` (raw grain) carried on a canonical segment —
      `eulogikon.units.ref` (the JSON `ref` key). Nullable, non-unique, SUB-SECTION grain
      (e.g. "1.5.1", "cod. 212"); hangs on the RAW `units.text_greek` row keyed
      `(eul_wid, sequence_num)`. A legacy reference TO that segment, never its identity.
    canonical_sense: >-
      Returned by get_work_units. NOT identity and NOT `unit_ref` — a different grain and
      text. The bare head "ref" FLOATS under CDP-055 (ref of what?); its referent is a
      `legacy_reference` to a `segment`. As a JSON key it is a canonical-data field
      (CDP-042), so the head-rename rides the v5 / CDP-055 reconciliation, not a cosmetic
      swap. We do not segment by it (CDP-055).
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: open-with-residue
    polysemy_debt:
      has_debt: true
      kind: free-floating
      cause: '"ref" is an abbreviation of reference and binds no referent (CDP-055); the value is a legacy_reference to a segment.'
      preferred_cure: Treat as a `legacy_reference` (raw grain); rename the JSON/column head under the v5 / CDP-055 reconciliation (CDP-042 owner-gated), distinct from the burnt `unit_ref`.
    cites: [CDP-054, CDP-055]

  unit_ref:
    signifier_form: [unit_ref]
    canonical_referent: >-
      BURNT (CDP-055). The live column `eulogikon.units_index.unit_ref` — NOT NULL, UNIQUE
      per work, SECTION grain (e.g. "1.5") on the NORMALIZED row. Its name is doubly
      free-floating: "unit" denotes nothing (a passage is a `segment`, not "unit type 74")
      and "ref" floats (reference of what?).
    canonical_sense: >-
      The value IS a `legacy_reference` (normalized grain) and what it addresses IS a
      `RID` (the cited span) — both already named. So the name is NOT cosmetically
      renamed (no `citation_ref` / `reference_locus` synonym, CDP-055) — it is ELIMINATED
      at v5: the address becomes the `RID` (grid key), the string a `legacy_reference`
      overlay. Distinct grain from `ref` (the two do NOT round-trip; 68 works carry one
      not the other). Live until v5; we do not segment by it (CDP-055).
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: retired
    variant_senses:
      - {signifier: unit_ref, referent: "the cited span (the address)", status: "retired -> RID (grid key)"}
      - {signifier: unit_ref, referent: "the citation string", status: "retired -> legacy_reference (normalized grain)"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: '"unit" + "ref" are both free-floating (CDP-055); the referents are RID (the cited span) + legacy_reference (the string), both already named. Eliminated at v5, not renamed.'
      preferred_cure: At v5, the address is a `RID` and the string a `legacy_reference` overlay; no `citation_*` / `reference_locus` synonym.
    cites: [CDP-054, CDP-055]

  units_index:
    signifier_form: [units_index]
    canonical_referent: >-
      BURNT (CDP-055). The live table `eulogikon.units_index` (schema_v2.sql:334) — one
      row per (eul_wid, unit_ref) carrying NORMALIZED Greek + a `reference_context` JSONB.
      Its name is free-floating ("unit" denotes nothing; "index" of what?) AND it embodies
      the forbidden pattern: it SEGMENTS THE CORPUS BY A LEGACY REFERENCE (its rows are
      `legacy_reference_segment`s, keyed and addressed by `unit_ref`).
    canonical_sense: >-
      We do not segment by legacy references (CDP-055): the canonical segmentation is the
      SID/RID grid. So this table is not cosmetically renamed (no `citation_index` /
      `reference_index` synonym) — it is ELIMINATED when the grid is minted: its rows
      (legacy_reference_segments) collapse onto the SID/RID grid, its normalized Greek
      becomes a derived view, and its `unit_ref` splits into a `RID` key + a
      `legacy_reference` overlay (CDP-054). Live until then; the search/citation surface
      EuGraphikon consumes today.
    owner: {domain: TXT, file: .eukoine/corpus_identity_and_schema.md}
    status: retired
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: 'Free-floating name AND a CDP-055 corollary violation (segments by legacy reference). Its rows are legacy_reference_segments; the grid abolishes them.'
      preferred_cure: At grid-mint, eliminate the table; rows collapse onto the SID/RID grid, `unit_ref` -> `RID` key + `legacy_reference` overlay. No `citation_*` synonym.
    cites: [CDP-054, CDP-055]

  legacy_reference_segment:
    signifier_form: [legacy_reference_segment]
    canonical_referent: >-
      A passage delimited by a legacy reference — a row of the (burnt) `units_index`,
      where "section 1.5" is treated as a segmentation unit. The DEPRECATED notion of a
      segment-defined-by-a-legacy-reference.
    canonical_sense: >-
      Names the thing CDP-055 abolishes: we do NOT segment by legacy references. The
      canonical address is grid-defined (`SID`/`RID`); a legacy_reference_segment is the
      legacy_reference_segment is the coarse, dirty, legacy-reference-delimited row that
      the SID/RID grid replaces. Retained only to name the migration target for
      elimination — never a structure to build on.
    owner: {domain: TXT, file: docs/governance/cdp_registry.yaml}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent — the deprecated legacy-reference-delimited row the grid abolishes (CDP-055)."}
    cites: [CDP-054, CDP-055]

  reference_coverage_class:
    signifier_form: [reference-found, flat-blob, line-only, no-margin, no-v18]
    canonical_referent: >-
      The reference-recovery verdict the detector assigns each work in
      archive/cleaning_substrate/stages/substrate_40_reference_recovery/ (contact_points.yaml): reference-found (a
      reference sequence decoded), flat-blob (sequence present but canonical collapsed
      -> re-segment), line-only (only line counters), no-margin / no-v18 (no decodable
      provenance margin).
    owner: {domain: TXT, file: scripts/audit/check_reference_coverage.py}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One closed value set; the detector's coverage verdict.}
    cites: [CDP-054]

  row:
    signifier_form: [row, WorkRow]
    canonical_referent: >-
      `WorkRow` = one interpreted passage row free of markup, with kind in
      {title, speaker, testimony, text}. Head `Work` conserved + qualifier `Row`
      — a correct baptismal head.
    canonical_sense: "Distinct from the generic SQL 'row' (a table tuple), which is a local technical term, not a domain referent."
    owner: {domain: TXT, file: src/core/work_rows.py}
    status: aligned
    polysemy_debt:
      has_debt: false
      kind: same-object-across-layers
      cause: WorkRow conserves the Work head; bare "row" in SQL context is local technical vocabulary, not a competing domain referent.
      preferred_cure: Keep WorkRow for the semantic object; bare "row" is fine only as a local SQL term.
    cites: [CDP-051]

  entry:
    signifier_form: entry
    canonical_referent: >-
      AMBIGUOUS in bare form — three unrelated homonyms. Always qualify: a
      collection-keyed item is a `collection entry`, a field in a JSON/dict object is a
      `field`, a DB record is a `record`. Never ship bare "entry" where one of the three
      applies.
    status: aligned
    variant_senses:
      - {signifier: entry, referent: "a collection-keyed item (SVF 2.413)", status: "pinned -> collection entry"}
      - {signifier: entry, referent: "a field in a JSON/dict object", status: "pinned -> field"}
      - {signifier: entry, referent: "a DB record / row", status: "pinned -> record"}
    polysemy_debt:
      has_debt: false
      kind: clean-by-qualification
      cause: >-
        Three low-stakes homonyms, each pinned to a precise term (collection entry /
        field / record); bare "entry" is resolved by always qualifying.
      preferred_cure: Use `collection entry` / `field` / `record`; never bare "entry".

  text:
    signifier_form: [text, GreekText, EnglishText]
    canonical_referent: >-
      The body text of a SID. The formal logic already baptises the distinct
      forms: `GreekText` (cleaned Greek), `EnglishText` (translation). DB column
      `text_greek_normalized` is the normalized GreekText.
    canonical_sense: "Bare 'text' is the genus; the species GreekText/EnglishText are the precise terms. They are not polysemy — they are typed sub-referents."
    owner: {domain: TXT, file: docs/formal_logic/text_pipeline_formal_logic.yaml}
    status: open-with-residue
    polysemy_debt:
      has_debt: false
      kind: genus-species
      cause: GreekText/EnglishText are typed species of the body-text genus; the only residue is bare "text" used where the language matters.
      preferred_cure: Qualify with the language (GreekText / EnglishText / text_greek_normalized) wherever the body language is load-bearing.
    cites: [INV-TXT-05]

  greek_running_text:
    signifier_form: [greek_running_text]
    canonical_referent: >-
      The faithful Greek-only PROJECTION of a stream: `greek_subsequence` with
      inter-word whitespace kept — every non-Greek run collapsed to one space,
      accents/case/final-sigma on letters preserved, exactly the `grc_conservation.GREEK_RE`
      conservation class after NFC. A lossy reference/measurement artifact (the "Greek
      floor"), owned by `cluster_greek_quality_gates/oracle/grc_conservation.py`.
    canonical_sense: >-
      DISTINCT from `GreekText` (the cleaned transmitted body text, with punctuation
      and structure intact): this is a structure-free, punctuation-shorn projection,
      not the body text. DISTINCT from `stream_fidelity.fold_for_fidelity` (the SEARCH
      fold — lowercased, sigma-unified, diacritic-stripped, for locating a span): that
      is a different owner answering a different question; the two folds must not be
      merged. CDP-051 head: the subject is `text` (the registered genus), qualified
      `greek_running`; the mechanism (the strip) is never the head.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/grc_conservation.py}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent — the faithful Greek-only projection; sibling to greek_subsequence (no spaces) and distinct from GreekText (the body text).}
    cites: [CDP-051, CDP-053]

  greek_running_text_rejoined:
    signifier_form: [greek_running_text_rejoined, rejoined_greek_floor]
    canonical_referent: >-
      RETIRED. Was a gated, derived, conservation-preserving NORMALIZATION of
      `greek_running_text` (stranded final-sigma and short-fragment splits glued iff
      the concatenation's `lemma_foldkey` resolved in the EuMorphikon `form_lemma`
      oracle). The referent was a fold used as a WRITER on Greek word boundaries,
      which CDP-064 forbids. No live producer or consumer remains; the decode-output
      body column is the gate input.
    canonical_sense: >-
      NOT a live stream. Head conserved from `greek_running_text` only as a retired
      signifier so the name is not re-coined by accident.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/grc_conservation.py}
    status: retired
    polysemy_debt: {has_debt: false, kind: clean, cause: "RETIRED: fold-as-writer on word boundaries (CDP-064). Gate input is the decode-output body column."}
    cites: [CDP-042, CDP-046, CDP-051, CDP-062, CDP-064]

  greek_floor:
    signifier_form: [greek_floor]
    canonical_referent: >-
      The Greek-fidelity floor of the God-source decode: the per-work conservation
      comparison OWNED by reader.Audit (decode_god_sources_xml_reader/audit.go) — the
      raw v18 render bytes' ordered Greek codepoints (the genuinely independent
      projection, CDP-060) diffed against the emitted resolved_source spine on every
      run, exported per-work in the verdict (audited / outcome / fidelity) — TOGETHER
      WITH its corpus roll-up decode_check_greek_floor.py, whose deterministic report
      (decode_greek_floor_report.json) proves totality/liveness/consistency/coherence
      of the accounting and backs decode_closure_record.json's crosscheck_report_ref.
    canonical_sense: >-
      One owner for the comparison (audit.go), one reporter for the accounting; a
      second comparator over any projection (a russian body-column reference, a
      russian_markup read, or a Python greekOfEmittedXML mirror) is the same-projection
      guard condemned at retirement — never rebuild one. CDP-051 head: the subject is
      the greek floor; the roll-up's mechanism (check) rides behind.
    owner: {domain: TXT, file: cluster_god_sources_v6_csv_grid/decode_god_sources_xml_reader/audit.go}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "Re-baptised at decode_column_grid W6b_greek_floor: the signifier binds to reader.Audit + the decode_check_greek_floor.py roll-up; any prior derived text-projection binding is retired."}
