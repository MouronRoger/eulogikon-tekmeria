# =============================================================================
# Eulogikon predicate lexicon — the positive referent registry
# =============================================================================
#
# WHAT THIS IS
#   A positive, generative registry of the signifiers (terms) the system reasons
#   over, each pinned to ONE canonical referent. It is the artefact you consult
#   BEFORE coining a name — class, field, JSON key, CLI flag, formal-logic
#   universe member, prose noun — so that polysemy is never minted in the first
#   place. Procedure: docs/predicate_vocabulary/one_system.md (the four-step
#   priority-order walk).
#
# WHY IT EXISTS
#   The "witness" disaster: one signifier grew SEVEN referents (data-source file,
#   comparison edition, testimonium citation, audit script, parallel stream, ...)
#   across 37 files before anyone noticed, then cost a repo-wide ban sweep and a
#   frozen 297-hit baseline to contain (work_reports/2026-06-08_00-04_witness_
#   terminology_ban_sweep_and_guardian.yaml). A ban list catches the disease
#   AFTER it spreads. This registry prevents it: the author of "witness sense #2"
#   consults the lexicon, finds the signifier already baptised, and is forced to
#   pick another. Saussure: the signifier is arbitrary, so rename is mechanical
#   churn; polysemy under one sign is unbounded cognitive cost that grows with
#   every reader. The registry retires the polysemy direction; baptismal_naming.md
#   (CDP-051) retires the orphaning direction (one referent, many names). Two
#   duals, one shared registry.
#
# AUTHORITY
#   This is the SINGLE positive vocabulary authority for the repo. The ban list in
#   docs/governance/source_terminology.md is a DERIVED VIEW of this file: a banned
#   signifier is simply an entry with status: retired (its ban_cell / replacement
#   feed the generated table). Keeping the ban list a projection rather than a
#   peer authority is what makes this registry comply with the repo's own CDP-006
#   (single authority per concern) and avoid AP-001 (parallel overlays).
#
#   This is also the per-subsystem baptismal registry that baptismal_naming.md
#   §7.1 and CDP-051's registry entry name as "not yet built" — the finite set of
#   christened heads a boundary-crossing name's head must be drawn from.
#
# STATUS OF THIS FILE
#   Seeded pilot (2026-06-10). It covers the live polyseme cluster and the
#   identity/witness/sidecar families, plus a worked binding of the text-pipeline
#   formal-logic universe. It is NOT yet exhaustive over src/core and scripts;
#   the registry is rolling — every agent appends an entry when an audit surfaces
#   a term, per one_system.md.
# =============================================================================

artefact_kind: predicate_lexicon
repo: eulogikon                            # the owning repository of this lexicon
authored: 2026-06-10
# Cross-repo: the sister repo EuGraphikon imports the corpus-identity terms below
# (eul_wid, eul_aid, SID, Unit, comparison_edition, citing_author, …) and
# verifies them against THIS file via EuGraphikon/scripts/check_shared_vocabulary.py.
# This lexicon does not list its consumers (dependency points importer -> owner,
# one-system.md); it just stays the stable source of truth.
companion_doctrine: one_system.md          # the consult-before-coining procedure
companion_inventory: inventory_2026-06-10.md  # the per-disagreement reconciliation workspace
baptismal_registry: true                   # fills baptismal_naming.md §7.1 (CDP-051)
governing_cdps: [CDP-006, CDP-038, CDP-050, CDP-051]

# The "spine" of eulogikon is the text pipeline. A term that traverses these
# phases carries the strongest single-vocabulary duty (one_system.md). A term
# local to one phase is lower-risk.
pipeline_spine: [raw, canonical, sid_assigned, translated, bilingual_paired, rendered]

# -----------------------------------------------------------------------------
# Per-entry schema (fields are optional unless marked *required*):
#   signifier_form        *  the token, or [aliases]
#   canonical_referent    *  what it denotes (Peirce: object) — one sentence
#   canonical_sense          meaning-in-use (Peirce: interpretant)
#   owner                    {domain, file} — the single authority that baptised it
#   pipeline_reach           which spine phases it traverses, or "local"
#   used_at                  [{path, role: owner|import|cite-only}]
#   variant_senses           [{signifier, referent, status}] — historical/retired senses
#   polysemy_debt            {has_debt, kind, cause, preferred_cure}
#   status                *  aligned | open-with-residue | open-unresolved | retired
#   cites                    [CDP-…, AP-…, INV-…]
#   # Ban-table projection (present only on retired identity/overload signifiers):
#   ban_order                integer — row order in the generated Banned table
#   ban_cell                 verbatim left-column markdown
#   replacement_cell         verbatim right-column markdown
# -----------------------------------------------------------------------------

entries:

  # ===========================================================================
  # A. The closed predicate set — the four iconic identity tokens.
  #    The strictest entries: cardinality-1 referents, no synonyms admitted.
  #    This is the one registry section eulogikon already had (INV-WID-14); it
  #    is transcribed here so the lexicon is the single home for it.
  # ===========================================================================

  eul_wid:
    signifier_form: eul_wid
    canonical_referent: >-
      The canonical primary database key of a Work — `eulogikon.works.eul_wid`
      PRIMARY KEY (schema_v2.sql) — and thus the unique identifier for each work;
      it begins with its eul_aid (before the first hyphen); the only
      token by which a Work may be identified anywhere in code, schema, or prose.
    canonical_sense: >-
      eul_wid IS the identity (the token equals its meaning) AND the storage
      primary key — one referent across the application and the database, no split.
      The owning eul_aid is parseable as the substring before the first '-'; no
      separate author_id column is needed.
    owner: {domain: WID, file: .eukoine/corpus_identity_and_schema.md}
    pipeline_reach: [raw, canonical, sid_assigned, translated, bilingual_paired, rendered]
    status: aligned
    polysemy_debt:
      has_debt: false
      kind: clean
      cause: One signifier, one referent (the work primary key), enforced by a closed-predicate-set audit.
    cites: [CDP-038, CDP-050, INV-WID-14, AP-021]

  eul_aid:
    signifier_form: eul_aid
    canonical_referent: >-
      The canonical primary database key of an Author — `eulogikon.authors.eul_aid`
      PRIMARY KEY (schema_v2.sql) — and thus the unique identifier for each author;
      an arbitrary 3-character code, explicitly NOT an abbreviation of any name.
    canonical_sense: "eul_aid IS the author identity and the storage primary key — one referent across application and database."
    owner: {domain: WID, file: .eukoine/corpus_identity_and_schema.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One signifier, one referent (the author primary key); closed predicate set.}
    cites: [CDP-038, CDP-050, INV-WID-14, AP-021]

  identifier:
    signifier_form: [identifier, "canonical identifier"]
    canonical_referent: >-
      The GENUS of the internal identity tokens — the ones the project mints and owns
      as the index of record: `eul_aid` (author), `eul_wid` (work), `sid` (a semantic
      unit), `rid` (a range of semantic units, serialized `start..end`). Each member is
      scoped to its level; together they are "the identifier" family. Two delimiters, never
      confused (.eukoine §1.4/§1.6): `-` joins the location-descent chain (AID/WID/SID/TID);
      `..` is the RID range operator — so an RID never collides with a TID. Within a work file
      the sid/rid are serialized **work-relative** (bare, `aaa`), the `eul_wid` the file head. NOT a reference (an external citation is) and NOT a
      legacy_reference (the courtesy citation strings `ref` / `unit_ref` are).
    canonical_sense: >-
      Use "identifier" for the genus (e.g. "eul_wid and eul_aid are the only permitted
      identifiers for works and authors"; sid/rid are the within-work identifiers). For
      a SPECIFIC token, cite the iconic token directly (eul_wid / eul_aid / sid / rid) —
      never the retired prose descriptor "reference key" / "the work key" (§10, ADR-014).
    owner: {domain: WID, file: docs/architecture/ADR-014-reference-names-external-citations-only.md}
    status: aligned
    variant_senses:
      - {signifier: "reference key", referent: "an identity token as a prose descriptor", status: "retired -> identifier (genus) / cite the iconic token; §10 + ADR-014"}
      - {signifier: "reference method", referent: "an identity token as a prose descriptor", status: "retired -> identifier; ADR-014"}
    polysemy_debt: {has_debt: false, kind: clean, cause: "Genus with level-scoped members (eul_aid/eul_wid/sid/rid); ADR-014 registers it so the retired 'reference key' descriptor has a baptised home."}
    cites: [CDP-005, CDP-038, CDP-051]

  work_display_string:
    signifier_form: work_display_string
    canonical_referent: >-
      A lowercase URL-safe human-readable prefix for a Work. A mutable ATTRIBUTE,
      never an identifier; the prefix piece of /works/{display}-{eul_wid}.
    canonical_sense: >-
      Decorates the URL/filename; carries no identity. The composition
      {work_display_string}-{eul_wid} is composed inline at every site and has no
      predicate of its own (coining one is the substitution defect).
    owner: {domain: WID, file: docs/governance/source_terminology.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Attribute, not identity; closed set.}
    cites: [CDP-050, INV-WID-14, AP-020, AP-021]

  author_display_string:
    signifier_form: author_display_string
    canonical_referent: >-
      A lowercase URL-safe human-readable prefix for an Author. A mutable
      ATTRIBUTE, never an identifier.
    owner: {domain: WID, file: docs/governance/source_terminology.md}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Attribute, not identity; closed set.}
    cites: [CDP-050, INV-WID-14, AP-020, AP-021]

  # ===========================================================================
  # B. Retired identity synonyms — the §10 banned families.
  #    status: retired. Each carries the ban-table projection so the generated
  #    Banned table in source_terminology.md reproduces from here.
  # ===========================================================================

  slug:
    signifier_form: [slug, slugs, url_slug, auth_slug, work_slug, slugify]
    canonical_referent: >-
      RETIRED. Imported "slug-as-key" thinking from CMS/static-site tooling, where
      a slug IS a key. In eulogikon the only identifiers are eul_wid / eul_aid.
    status: retired
    variant_senses:
      - {signifier: slug, referent: "the work/author identity", status: "retired -> eul_wid / eul_aid"}
      - {signifier: slug, referent: "the URL/filename prefix", status: "retired -> work_display_string / author_display_string"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: Both senses retired into the closed predicate set; migration in progress (~3k residual).
    cites: [CDP-050, INV-WID-14, AP-021]
    ban_order: 3
    ban_cell: "*slug*, *slugs*, and any identifier containing `slug` (`url_slug`, `auth_slug`, `slugify`, …)"
    replacement_cell: "§10 below; **CDP-050**"

  file_id:
    signifier_form: [file_id, fileId, "file-id"]
    canonical_referent: "RETIRED. A file-identity coinage that competes with eul_wid / eul_aid."
    status: retired
    polysemy_debt: {has_debt: false, kind: clean-after-retirement, cause: Retired into closed predicate set.}
    cites: [CDP-050, INV-WID-14, AP-021]
    ban_order: 4
    ban_cell: "*file_id* and camelCase/snake_case variants"
    replacement_cell: "§10 below; **CDP-050**"

  stem:
    signifier_form: [stem, file_stem, work_stem, author_stem, store_stem]
    canonical_referent: >-
      RETIRED. A name for the composition {work_display_string}-{eul_wid}. The
      composition has no predicate — it is composed inline at each emission site.
    status: retired
    polysemy_debt: {has_debt: false, kind: clean-after-retirement, cause: Composition has no predicate (AP-021).}
    cites: [INV-WID-14, AP-021]
    ban_order: 5
    ban_cell: "*stem*, *file_stem*, *work_stem*, *author_stem*, *store_stem*"
    replacement_cell: "§10 below; **INV-WID-14**, **AP-021**"

  name_identity:
    signifier_form: name
    canonical_referent: >-
      RETIRED in the work/author-identity sense. "name" for a Work or Author
      identity, or for the composition, re-privatises identity the system keeps
      public.
    status: retired
    variant_senses:
      - {signifier: work_name, referent: "work identity / composition", status: retired}
      - {signifier: author_name, referent: "author identity / composition", status: retired}
      - {signifier: universal_name, referent: "the composition", status: retired}
      - {signifier: artefact_name, referent: "the composition", status: retired}
    polysemy_debt: {has_debt: false, kind: clean-after-retirement, cause: Identity sense retired; ordinary-prose "name" of a person/work title is unaffected.}
    cites: [INV-WID-14, AP-021]
    ban_order: 6
    ban_cell: "*name* when referring to a work or author identity or to the composition `{display_string}-{eul_*}` (including `work_name`, `author_name`, `universal_name`, `artefact_name`)"
    replacement_cell: "§10 below; **INV-WID-14**, **AP-021**"

  display_name:
    signifier_form: [display_name, display_prefix, decorative_prefix]
    canonical_referent: "RETIRED synonyms for the one display predicate per row (work_display_string / author_display_string)."
    status: retired
    polysemy_debt: {has_debt: false, kind: clean-after-retirement, cause: One predicate per row; no synonyms.}
    cites: [INV-WID-14, AP-021]
    ban_order: 7
    ban_cell: "*display_name*, *display_prefix*, *decorative_prefix*"
    replacement_cell: "§10 below; **INV-WID-14**, **AP-021**"

  wid_aid_abbreviations:
    signifier_form: [wid, aid, work_id, author_id, work_key, author_key]
    canonical_referent: >-
      RETIRED SPELLINGS of the canonical primary keys. These denote the RIGHT,
      canonical referent — the work/author primary key, the unique reference (see
      `eul_wid` / `eul_aid`) — but with a non-iconic spelling. Retirement is about
      the spelling only, not the concept: the referent is the most canonical thing
      in the system.
    canonical_sense: >-
      Distinct from the wrong-concept retirements (`slug`, `file_id`, `work_key`,
      `stem`, `name`), which import a FOREIGN referent (key-as-slug,
      composition-as-name). `wid` / `aid` / `work_id` / `author_id` point at the
      correct referent; the cure is the iconic spelling `eul_wid` / `eul_aid`, the
      only sanctioned one. (`work_key` / `author_key` straddle: right referent,
      but "key" is the descriptor §10 also bans.)
    status: retired
    variant_senses:
      - {signifier: "wid / aid / work_id / author_id", referent: "the work/author primary key", status: "retired spelling -> eul_wid / eul_aid (right referent)"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: Right referent, retired spelling — the iconic eul_wid / eul_aid is the only sanctioned form; not a wrong-concept import.
    cites: [INV-WID-14, AP-021]
    ban_order: 8
    ban_cell: "*wid*, *aid*, *work_id*, *author_id*, *work_key*, *author_key* (as parameter, attribute, key, or prose label)"
    replacement_cell: "§10 below; **INV-WID-14**, **AP-021**"

  english_descriptors:
    signifier_form: ["the work key", "the WID", "the display piece", "the reference key"]
    canonical_referent: "RETIRED. Code-adjacent prose descriptors for the predicates; cite the iconic token directly instead."
    status: retired
    polysemy_debt: {has_debt: false, kind: clean-after-retirement, cause: Cite the iconic token, not a descriptor.}
    cites: [INV-WID-14, AP-021]
    ban_order: 9
    ban_cell: "English descriptors referring to the predicates (\"the work key\", \"the WID\", \"the display piece\", \"the reference key\" in code-adjacent prose)"
    replacement_cell: "§10 below; **INV-WID-14**, **AP-021**"

  prefix_suffix:
    signifier_form: [prefix, suffix, work_suffix, work_prefix, author_prefix, author_suffix]
    canonical_referent: >-
      RETIRED as names for any part of a canonical identifier. Generic
      string-operation words that, applied to an eul_wid / eul_aid, re-derive an
      identity already given and rename it: the part before the hyphen IS the
      eul_aid (the author, prior to its works — recoverable operationally by
      eul_aid_of(), never renamed "prefix"), and the letters after the eul_aid,
      composed, ARE the proper identifiers — a WID (`abe-ac`), a SID
      (`abe-aca-aaa`), an RID (`abe-aca-aaa..abe-aca-aam`, serialized `start..end` with
      the `..` range operator — a range of SIDs). A fragment in isolation
      acquires no generic alias (`suffix` / `work_suffix`, AP-021): name the
      composed identifier by its proper name (WID / SID / RID), never the
      fragment. The iconic predicates are immutable and acquire no generic alias.
    canonical_sense: >-
      Owner ruling (2026-06-14): a generic string op on a canonical identifier is
      the WORST place for these words, not a safe one — it is the exact route by
      which `slug` came to stand in for `wid`. The ban is therefore NOT scoped
      away from string operations; it bites precisely when the operated-on string
      is an eul_wid / eul_aid (the parts produced by split / rsplit / slice /
      startswith included). `prefix` / `suffix` on a genuinely unrelated,
      non-identity string is a separate usage and is untouched. Operational
      recovery of the eul_aid is allowed (eul_aid_of()); what is forbidden is
      letting the recovered part be thought a derivative of the work — the author
      is prior to the work, not parsed out of it (the foreign key, not the string,
      is the authority).
    status: retired
    variant_senses:
      - {signifier: prefix, referent: "the eul_aid (the part of an eul_wid before the hyphen)", status: "retired -> eul_aid; recover operationally via eul_aid_of(), never name it 'prefix'"}
      - {signifier: suffix, referent: "the letters of an eul_wid after the eul_aid", status: "retired -> no predicate (AP-021); describe positionally"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: >-
        Sense-scoped retirement; generic prefix/suffix on non-identity strings
        unaffected. The law layer already migrated prefix() -> eul_aid_of() and
        deleted suffix(); a cross-doc/code sweep of the {eul_aid}-{suffix} formula
        (CDP-038, cdp_registry.yaml, the EuKoine corpus identity spec, code) remains, intersecting the
        unratified ADR-013.
    cites: [CDP-038, CDP-050, CDP-051, INV-WID-14, AP-019, AP-020, AP-021]
    ban_order: 10
    ban_cell: "*prefix* / *suffix* (and *work_prefix*, *work_suffix*, *author_prefix*, *author_suffix*) as a name for any part of an `eul_wid` / `eul_aid` — the part before the hyphen IS the `eul_aid`, the letters after it have no name — including the result of a generic string op (`split`, `rsplit`, slice) on a canonical identifier"
    replacement_cell: "§10 below; **CDP-038**, **AP-021**"

  # ===========================================================================
  # C. The witness cluster — the founding disease and its five baptised cures.
  #    The retired `witness` entry IS the source the ban-table row derives from;
  #    its variant_senses enumerate the seven historical referents.
  # ===========================================================================

  witness:
    signifier_form: witness
    canonical_referent: >-
      RETIRED. A signifier that accreted seven referents at once. No live referent;
      every sense is reassigned to a precise term below.
    canonical_sense: >-
      The overloading the registry exists to kill: one word for source files AND
      comparison editions AND citing authors AND audit scripts AND parallel
      streams, so no reader could disambiguate without already knowing the
      subsystem.
    owner: {domain: TXT, file: docs/governance/source_terminology.md}
    status: retired
    variant_senses:
      - {signifier: witness, referent: "conversion-input HTML/TSV under z_no_git/", status: "retired -> data_source_file"}
      - {signifier: witness, referent: "external TEI/plaintext for scar-audit", status: "retired -> comparison_edition"}
      - {signifier: witness, referent: "source citation in fragment/compendium (who quoted whom)", status: "retired -> citing_author"}
      - {signifier: witness, referent: "a corpus-scope INV check", status: "retired -> audit_script"}
      - {signifier: witness, referent: "future TLA multi-text layer", status: "retired -> parallel_stream"}
      - {signifier: witness, referent: "plain-English 'authoritative arbiter'", status: "retired -> arbiter / source"}
      - {signifier: witness, referent: "legacy JSON unit field / DB columns / CSS class / render sentinel", status: "deferred (bucket-2 schema migration); frozen in check_no_witness_baseline.json"}
    polysemy_debt:
      has_debt: false
      kind: clean-after-retirement
      cause: >-
        Seven referents fully separated into five baptised prose terms plus the
        formal-logic entity ComparisonEdition; the only residue is the deferred
        on-disk bucket-2 identifier set, held at a frozen baseline pending the
        coordinated schema/editor migration.
      preferred_cure: Use the precise §1–§5 term; retire the bucket-2 field set in a coordinated migration.
    enforcement: "scripts/audit/check_no_witness.py (ratchet baseline; check_no_witness_baseline.json — 268 hits / 40 files)"
    cites: [INV-TXT-09]
    ban_order: 1
    ban_cell: "bare *witness* / *witnesses* (overloaded prose token); legacy bucket-2 identifiers (frozen baseline)"
    replacement_cell: "§1–§5 below; qualified `*_witness_*` signifiers per lexicon"

  v18:
    signifier_form: v18
    canonical_referent: >-
      RETIRED as a bare token. "version 18" names a source-extraction lineage that exists in
      distinct forms a bare "v18" cannot disambiguate. Always qualify: restructured_v18 (the
      HTML), v18_tsv (the TSV comparison stream), or — for the generic fold/align/containment
      engine that runs against EITHER stream — comparison.
    canonical_sense: >-
      Polysemy caught early (the witness disease in miniature): one signifier for the trusted
      restructured HTML AND the downstream post-processed TSV AND the format-agnostic
      comparison engine, so no reader could tell which a "v18" denoted.
    owner: {domain: TXT, file: docs/predicate_vocabulary/lexicon.yaml}
    status: retired
    variant_senses:
      - {signifier: v18, referent: "the restructured v18 HTML (z_no_git/provenance/restructured_v18[_speakers]/) — headless-browser render of the raw Russian source; the TRUSTED reference, and the source the semantic verifier judges against", status: "retired -> restructured_v18"}
      - {signifier: v18, referent: "the post-processed source-text layer (data/canonical_txt_clean/) — the HTML further processed by the upstream philofree1 pipeline (hyphen rejoin, marker strip, verse-keep/prose-merge baked in); a downstream, less-certain helper named canonical_txt", status: "retired -> canonical_txt"}
      - {signifier: v18, referent: "the generic published-vs-other fold/align/dense-containment engine in stream_fidelity, fed EITHER the TSV or the HTML", status: "retired -> comparison"}
    polysemy_debt:
      has_debt: false
      kind: live-rename
      cause: >-
        The three referents are separated by the rename: restructured_v18 (HTML, kept),
        v18_tsv (TSV stream), comparison (the generic engine). HTML-provenance parsers
        (v18_margin / v18_geometry / v18_can) are the restructured_v18 form.
      preferred_cure: Use restructured_v18 (HTML, the God Source) / canonical_txt (source-text layer) / comparison (engine); never bare v18.
    enforcement: "rename pass (this session); bare v18 retired across the fidelity + provenance subsystems"

  canonical_txt:
    signifier_form: canonical_txt
    canonical_referent: >-
      The post-processed source-text layer at data/canonical_txt_clean/*-{eul_wid}.txt
      (ref<TAB><TAB>greek): the restructured_v18 HTML extracted by the upstream philofree1
      pipeline to canonical_v2.0 _can.json and post-processed (hyphen rejoin, editorial-marker
      strip, verse-keep-lines / prose-merge). Historically mislabelled "v18"/"v18_tsv" — it
      carries no version stamp and is a later generation than v18. A triangulation/verification
      HELPER, DOWNSTREAM of the God Source restructured_v18; trusted per-work only where it
      corroborates the God Source (CDP-060), never an authority.
    naming_exception: >-
      "canonical" is otherwise reserved for the published work JSON (CDP-042). canonical_txt is a
      SANCTIONED exception (owner decision, 2026-07-01): the source-text layer keeps its name
      canonical_txt_clean. The bijection (CDP-051) holds because "canonical" is reserved by CDP-042
      for the published work JSON (it is not itself a lexicon signifier), while canonical_txt is the
      separately registered signifier for this source layer — two distinct referents.
    owner: {domain: TXT, file: scripts/audit/check_source_completeness.py}
    status: active

  v18_tsv:
    signifier_form: v18_tsv
    canonical_referent: "RETIRED -> canonical_txt. The post-processed source-text layer was renamed to its directory name (canonical_txt_clean / canonical_txt) and promoted to data/canonical_txt_clean/; 'v18_tsv' is a retired mislabel (no version stamp; a later generation than v18)."
    owner: {domain: TXT, file: scripts/audit/check_source_completeness.py}
    status: retired

  human_face:
    signifier_form: human_face
    canonical_referent: >-
      The EuLogikon public reading face (CDP-065): book-quality reflowing layout across
      web/ebook/print delivery surfaces — genre-correct flow/keep/list; not a print facsimile.
    owner:
      domain: TXT
      file: cluster-god-sources-xml/decode_god_sources_central_plan/resolved_source_dual_face_telos.md
