  # --- the referral family: what the reader does with markup it cannot type ----
  # Baptised 2026-07-13 (emit-and-refer landing; work report
  # cluster-god-sources-xml/decode_god_sources_xml_work_reports/2026-07-13_referral_family_baptism.yaml).
  # The emit-and-refer cut made these THREE signifiers load-bearing across the reader, the
  # schema role registry, and the review-point seam — and registered none of them (AP-023).
  # The family is a rule / a role / a field: ONE law, the span role it emits, and the token
  # that role carries. Held apart below; the confusion they prevent is exact: a referred
  # marker is NOT an exemption, and the overlay ROLE is NOT the finding KIND.

  markup_supplement:
    signifier_form: [markup_supplement, MarkupSupplement]
    canonical_referent: >-
      Markup supplied by the SENSE LANE (the kwb-llm, or a human) that DECLARES the type of
      a span in the God Source which the decoder could not type from the source's own
      markup. Anchored by a `keyed_window` (content-addressed, so it survives
      re-segmentation and needs no offset); stored NON-DESTRUCTIVELY beside the frozen God
      Source (z_no_git is a read-only vault and is never written); and read by the decoder
      on the NEXT pass as an ordinary markup input, indistinguishable from markup the
      source had carried all along. It is the INBOUND half of the referral loop, of which
      `referral_rule` is the outbound half.
    canonical_sense: >-
      THE POINT OF THE NAME: the decoder never "applies a verdict" and therefore never
      crosses the mechanical ceiling (CDP-064). It has exactly ONE mode, in every run,
      forever — READ MARKUP, emit the body, refer what it cannot type. A markup_supplement
      converts an ABOVE-the-ceiling judgement (what does this span MEAN?) into a
      BELOW-the-ceiling FACT (the source now DECLARES its type), made once, auditably, and
      frozen where a later reader can inspect it. The loop converges: each pass leaves
      fewer unresolved sites.
      NOTHING IS EVER DELETED — BECAUSE NOTHING IS EVER WRITTEN. The God Source is frozen
      (CDP-060) and the supplement is purely ADDITIVE, so `source + supplement` is the
      complete record, permanently, and v5 is a PROJECTION of it. A span declared pollution
      is LIFTED TO A TYPED OVERLAY and excluded from the v5 body; the Latin of a Greek-only
      corpus (CDP-053) is therefore NOT DISCARDED but NOT PROJECTED — re-decode and it is
      back. Absent from a projection is not deleted from the record.
      CONSEQUENCE: THERE IS NO IRREVERSIBLE ACT IN THE PIPELINE. A wrong mark is a BUG, not
      a corruption — fix the supplement and re-run; the cost of a mistake is a RE-RUN, not a
      LOSS. So correctness is never a PRECONDITION for emitting v5, only a DIRECTION OF
      TRAVEL. Contrast the κ-rejoin, which was catastrophic because it wrote INTO the text
      and destroyed the evidence of its own error in the same stroke. The difference is
      STRUCTURAL, not procedural. The only irreversible loss possible is losing the God
      Sources or the supplements themselves — so those, and only those, are what must be
      protected.
      Held DISTINCT from four neighbours, which is why the bijection needs it:
      `legend` is the markup DICTIONARY (a class -> its meaning); a markup_supplement is an
      INSTANCE declaring ONE span's type. `overlay` is the v5 output; a markup_supplement is
      an INPUT that CAUSES one. `review_point` / `verdict` are the request/response of the
      review record; a markup_supplement is what a response BECOMES once it lands on the
      source. `keyed_window` is the ANCHOR it rides on, not the thing itself.
      CDP-051 head: the subject is `markup` — conserved, because the decoder cannot tell it
      from the source's own — qualified `supplement`: it ADDS to the source's markup and
      never replaces or edits it. The non-destructiveness is in the name.
    owner: {domain: TXT, file: cluster-god-sources-xml/decode_god_sources_central_plan/resolved_source_markup_supplement_doctrine.md}
    status: open-with-residue
    polysemy_debt:
      has_debt: false
      kind: clean
      cause: >-
        Coined 2026-07-14 (owner ruling). The referent had NO name, and that absence is why
        the review-seam design drifted to "verdict -> the decoder APPLIES it" (campaign R3):
        with no word for the returning markup, a verdict was the only available shape — and
        it puts meaning back INSIDE the decoder, which is what CDP-064 forbids. Naming the
        artefact makes the correct architecture sayable.
    cites: [CDP-006, CDP-054, CDP-060, CDP-064]

  referral_rule:
    signifier_form: [referral_rule]
    canonical_referent: >-
      The reader's decode law for markup it cannot type: the untypable is REFERRED —
      emitted verbatim in place as an unresolved_marker span and reported as a located
      finding carrying a keyed_window — never returned as a Go error that discards the
      body (error is infrastructure-only), and never silently routed into the spine.
      One of the closed non_legend_sources in the schema role registry; the legend_source
      of the finding, keyed_window, before_fold, after_fold, detail, and claim elements.
    canonical_sense: >-
      The law that holds INV-TXT-14 (totality + addressability) and discharges AP-029: the
      reader stops destroying the texts it reads, and every finding names its site. Sibling
      of the other decode-time rules (ekthesis_rule, seam_rule, crux_rule,
      latin_apparatus_rule, var_il_rule) — a subject-qualified rule, head `rule` with the
      baptised subject riding in front (CDP-051). The fix is NEVER "extend the legend" (a
      treadmill): the legend types what it declares; referral_rule governs the rest.
    owner: {domain: TXT, file: cluster-god-sources-xml/decode_god_sources_central_plan/resolved_source_schema_roles.yaml}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent — the refer-never-discard decode law; a closed non_legend_source, enumerated both ways by the G-B0 schema-role gate."}
    cites: [CDP-037, CDP-039, CDP-051, CDP-064, AP-029, INV-TXT-14]

  unresolved_marker:
    signifier_form: [unresolved_marker, RoleUnresolvedMarker]
    canonical_referent: >-
      The span role resolved.RoleUnresolvedMarker: markup the reader could not type,
      emitted VERBATIM, in place, with the Greek around it untouched — the page containing
      a hyperlink is a fact about the page, never grounds to suppress a text (AP-029).
      Carries its source token in `marker`; its site is located by a keyed_window.
    canonical_sense: >-
      Deliberately ABSENT from resolved.IsOverlayRole — a referred marker is NOT an
      exemption: exempting it would relieve content of UNKNOWN type into the spine
      unmeasured, precisely the blindness the residue ledger exists to prevent (AP-028).
      A referred marker carrying Latin lands the work in foreign_script and routes it to
      the kwb_llm_boundary repair_lane — the correct lane, not a laundered one. ANTI-POLYSEMY:
      DISTINCT from unknown_marker — unresolved_marker is the XML overlay ROLE on the span
      (the thing in the record); unknown_marker is findings.OutcomeUnknownMarker / FindingCode
      "unknown_marker" (the verdict class, routed decoder_mechanical and listed on
      kwb_ambiguity_kind). One names where the markup sits; the other names why the work was
      routed.
    owner: {domain: TXT, file: cluster_god_sources_v6_csv_grid/decode_god_sources_xml_reader/resolved/role.go}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent — the reader-synthesised span role; single-owned in role.go beside its sibling synthetic roles (lacuna, latin_apparatus, parentheses, editorial_bracket, crux, font_scale)."}
    cites: [CDP-054, CDP-064, AP-028, AP-029, INV-TXT-14]

  v18_cell_concatenation:
    signifier_form: [v18_cell_concatenation]
    canonical_referent: >-
      The closed finding code raised when restructured_v18 carries a second
      content-bearing plain <td> in one row: v18 has already flattened the edition's
      column grid to at most two cells, the first content cell is the body line, and
      the second is the flattened right-margin column (class=R in every corpus row,
      census 2026-07-14). The reader REFUSES the concatenation — the content never
      reaches the body line; it is preserved verbatim as a claim on a located finding
      (referral_rule; the margin column is russian_source-sovereign). The finding
      does not set the Verdict outcome: it is absent from decodeFindingPrecedence, so
      the audit classifies the work as before.
    canonical_sense: >-
      One of the referral_rule family: the reader refers what it cannot place, never
      guesses and never discards (AP-029). ANTI-POLYSEMY: DISTINCT from
      greek_stream_fusion (the two witnesses' Greek parting company) and from
      unresolved_marker (an untypable inline span, emitted in place) —
      v18_cell_concatenation is a CELL-LEVEL refusal in the flattened v18 grid, the
      v18-side half of the column model (resolved_source_column_model_spec.md §0:
      v18 keeps the citation and body columns; the margin column arrives flattened).
    owner: {domain: TXT, file: cluster_god_sources_v6_csv_grid/decode_god_sources_xml_reader/source/v18_dom.go}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: "One referent — the refused second plain cell; single-owned in v18_dom.go parseCell, surfaced once in flattenV18."}
    cites: [CDP-037, CDP-060, CDP-064, AP-029, INV-TXT-14]

  marker:
    signifier_form: [marker, Marker]
    canonical_referent: >-
      resolved.Span.Marker — the verbatim source token the reader could not type,
      populated ONLY on an unresolved_marker span. Structural: a field carried on the
      span, never a regex-derived token (the _marker_token prose regex retired with the
      emit-and-refer landing — the marker token is structural now).
    canonical_sense: >-
      SCOPED signifier: bare `marker` denotes this referent ONLY as the field of an
      unresolved_marker span. Elsewhere the bare noun is polysemous (editorial marker,
      legend marker, the ~50-marker JS/CSS markup of the God-source render, gate/milestone
      marker) — qualify it there. Conserving the bare head here is deliberate: the Go
      field IS `Marker`, and the field's own type (unresolved_marker span) supplies the
      qualification at every use site (CDP-051).
    owner: {domain: TXT, file: cluster_god_sources_v6_csv_grid/decode_god_sources_xml_reader/resolved/model.go}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt:
      has_debt: true
      kind: residual-collision
      cause: >-
        Bare "marker" appears unqualified in prose across the repo (editorial marker, legend
        marker, the ~50-marker JS/CSS markup of the God-source render, gate/milestone marker)
        while the code field resolved.Span.Marker binds the bare token to ONE referent.
      preferred_cure: >-
        Qualify outside the one field — editorial marker / legend marker / gate marker; bare
        `marker` only as the unresolved_marker span's token field.
    cites: [CDP-050, CDP-051, CDP-064, AP-023, AP-029]

  # ===========================================================================
  # ASP-1 Greek-predicate unification (2026-06-29).
  # The four Greek predicates are DISTINCT and single-owned.  No caller may
  # re-derive the class, the letter test, the uppercase test, or a fold.
  # ===========================================================================

  conservation_greek:
    signifier_form: [conservation_greek, GREEK_RE]
    canonical_referent: >-
      The codepoint CLASS whose presence is conserved across every cleaning edit:
      Greek + Coptic (U+0370–U+03FF), Greek Extended (U+1F00–U+1FFF), and the
      combining diacritical marks (U+0300–U+036F) that attach to Greek letters.
      Owned as `GREEK_RE` in `cluster_greek_quality_gates/oracle/grc_conservation.py`; helpers
      `greek_subsequence`, `greek_multiset`, `greek_running_text`, and
      `has_greek` are views of the same class.
    canonical_sense: >-
      This is the CONSERVATION class, not the letter test and not a fold.  A stage
      may relocate or delete non-Greek matter, but no codepoint in this class may
      vanish from the corpus without reappearing in an overlay.  Consumers import
      the owner; they never recompile `[Ͱ-Ͽἀ-῿]` or `[\u0370-\u03FF\u1F00-\u1FFF]`.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/grc_conservation.py}
    pipeline_reach: [raw, canonical, sid_assigned, translated, bilingual_paired, rendered]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Single owner enforced by guardians/cli/check_single_definitions.py; migration complete.}
    cites: [CDP-046, CDP-051, INV-TXT-11]

  greek_letter:
    signifier_form: [greek_letter, is_greek_letter]
    canonical_referent: >-
      The LETTER test: true iff a single character is a Greek letter (Unicode
      category L in the Greek + Greek-Extended blocks).  Owned as
      `is_greek_letter` in `cluster_greek_quality_gates/oracle/greek_normalizer.py`.
    canonical_sense: >-
      Distinct from `conservation_greek` (which includes combining marks, spacing
      accents, and Greek-block symbols) and from `is_greek_char` (the
      Unicode-name-based codepoint test used for Latin detection / `_desigma`).
      This predicate answers ONLY "is this a Greek letter?".
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/greek_normalizer.py}
    pipeline_reach: [raw, canonical, sid_assigned]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Single owner selected 2026-06-29 (D-letter); retiring scripts/audit/check_speaker_coverage._is_greek_letter.}
    cites: [CDP-046, CDP-051]

  greek_allcaps:
    signifier_form: [greek_allcaps, is_allcaps_greek]
    canonical_referent: >-
      The UPPERCASE test: true iff a string contains at least one uppercase Greek
      letter and NO lowercase Greek letter.  Punctuation, digits, and non-Greek
      characters are transparent.  Owned as `is_allcaps_greek` in
      `cluster_greek_quality_gates/oracle/greek_normalizer.py`; built on `greek_letter` so the letter test
      stays single-owned.
    canonical_sense: >-
      Titlecase precomposed capitals (category Lt) count as upper.  This is the
      predicate for detecting numbered-book / section headings that are all-caps
      Greek.  Distinct from the conservation class and from the search fold.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/greek_normalizer.py}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Single owner selected 2026-06-29 (D-home); retiring scripts/audit/check_speaker_coverage._is_allcaps_greek.}
    cites: [CDP-046, CDP-051]

  conservation_fold:
    signifier_form: [conservation_fold, greek_subsequence, greek_multiset]
    canonical_referent: >-
      The diacritic-preserving, case-preserving, final-sigma-preserving fold used
      for conservation accounting.  Implemented in `cluster_greek_quality_gates/oracle/grc_conservation.py`
      as `greek_subsequence` (order-preserving) and `greek_multiset` (order-blind).
    canonical_sense: >-
      This fold answers "did any Greek codepoint disappear, appear, or (for the
      subsequence) reorder?"  It must NOT strip accents, lower-case, or unify
      sigma.  Distinct from `search_fold` and `geometry_fold`.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/grc_conservation.py}
    pipeline_reach: [canonical, sid_assigned]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One of four correctly distinct folds; single owner.}
    cites: [CDP-046, CDP-051, INV-TXT-11]

  search_fold:
    signifier_form: [search_fold, fold_for_fidelity]
    canonical_referent: >-
      The diacritic-insensitive, lowercased, sigma-unified fold used to COMPARE
      a work to the God Source (v18) under orthographic noise.  Owned as
      `fold_for_fidelity` in `src/core/stream_fidelity.py`.
    canonical_sense: >-
      This fold answers "where does this Greek content appear in the God Source
      if we ignore accents, case, and lunate/final-sigma distinctions?"  It
      keeps spaces/punctuation so the alignment can follow the source's word
      geometry.  It builds on `conservation_greek` (importing `GREEK_RE`) but is
      NOT the conservation class.  Distinct from `overlay_lift_fold` and
      `geometry_fold`.
    owner: {domain: TXT, file: src/core/stream_fidelity.py}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One of four correctly distinct folds; single owner.}
    cites: [CDP-046, CDP-051]

  overlay_lift_fold:
    signifier_form: [overlay_lift_fold, lemma_foldkey, grc_fold]
    canonical_referent: >-
      The Greek match-fold family used to LOCATE a margin coordinate in the
      canonical body (titles, lines, references, speakers) and to merge
      lexicon/surface forms. Two live bindings share the ratified Greek core
      (lowercase, strip combining, final/lunate sigma ς/Ϲϲ→σ, single-pass
      iota-adscript canonicalisation): the Python letters-only merge-key
      `lemma_foldkey` in `cluster_greek_quality_gates/oracle/greek_normalizer.py`
      and the SQL boundary-preserving search-fold `grc_fold`
      (`eulogikon.grc_fold`). They are NOT byte-identical: the merge-key keeps
      letters only and glues, while the search-fold keeps boundaries. Coherence
      invariant: `lemma_foldkey(t) == letters_only(grc_fold(t))`. A byte-identical Go
      twin lands in `cluster_greek_quality_gates/grcfold/` on the record ring's first
      consumer (golden-mastered against this owner).
    canonical_sense: >-
      This fold answers "do these two Greek strings match under accent, case,
      punctuation, sigma-variant (incl. lunate), and iota adscript/subscript
      variance?" The Python binding drops all non-letters; the SQL `grc_fold`
      binding keeps spaces/punctuation/digits so search can follow word
      geometry. Distinct from `search_fold` (God-source fidelity,
      `fold_for_fidelity`) and `geometry_fold`.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/greek_normalizer.py}
    pipeline_reach: [raw, canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One match-fold family with two bindings (Python merge-key / SQL search-fold) related by letter-projection; lunate→σ conformed to the ratified core 2026-07-09; consolidated from `majusculize.fold_compare` 2026-07-01.}
    cites: [CDP-046, CDP-051]

  geometry_fold:
    signifier_form: [geometry_fold, fold_char, fold_str]
    canonical_referent: >-
      The structure-repair fold used by the monolith defuse process to compare
      source and canonical spans at the ekthesis geometry boundary.  Owned as
      `fold_char` / `fold_str` in
      `archive/cleaning_substrate/stages/substrate_30_structure_repair/defuse_monolith.py`.
    canonical_sense: >-
      This fold answers "do these two spans match at the boundary where
      segmentation may have changed?"  It is tuned for the defuse geometry
      comparison and is deliberately distinct from `search_fold` and
      `conservation_fold`.
    owner: {domain: TXT, file: archive/cleaning_substrate/stages/substrate_30_structure_repair/defuse_monolith.py}
    pipeline_reach: [canonical]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One of four correctly distinct folds; single owner.}
    cites: [CDP-046, CDP-051]

  editorial_marks:
    signifier_form: [editorial_marks, EDITORIAL_MARKS]
    canonical_referent: >-
      The conserved set of editorial signs: angle brackets and aliases (U+3008/9,
      U+2329/A, U+27E8/9), square brackets, and the cruces † ‡ ÷.  Owned as
      `EDITORIAL_MARKS` in `cluster_greek_quality_gates/oracle/grc_conservation.py`.
    canonical_sense: >-
      These marks are conserved until the Stage-8 decision that judges them; none
      is created or destroyed before then.  Distinct from apparatus-sigil sets
      (which may include metric symbols and `×`).  Consumers import the owner;
      they never recompile a dagger/obelus literal.
    owner: {domain: TXT, file: cluster_greek_quality_gates/oracle/grc_conservation.py}
    pipeline_reach: [raw, canonical, sid_assigned]
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Single owner; obelus ÷ added 2026-06-24 per ASP-6 owner ruling.}
    cites: [CDP-046, CDP-051]

  hyphen_chars:
    signifier_form: [hyphen_chars, HYPHEN_CHARS]
    canonical_referent: >-
      The set of hyphen/codepoint characters used in the hyphenation pipeline:
      soft hyphen (U+00AD) and hyphen (U+2010).  Owned as `HYPHEN_CHARS` in
      `src/hyphenation/constants.py`.
    canonical_sense: >-
      A narrow mechanical set, not a Greek predicate.  Consumers import the owner;
      they never recompile `[\u00AD\u2010-]`.
    owner: {domain: hyphenation, file: src/hyphenation/constants.py}
    pipeline_reach: local
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: Single owner enforced by guardians/cli/check_single_definitions.py.}
    cites: [CDP-046, CDP-051]

  scope:
    signifier_form: scope
    canonical_referent: >-
      The corpus-scope discipline: the set of works a pipeline stage operates over
      — "every work in the corpus", never a per-work subset. A stage is correct for
      its whole scope or it is broken (CDP-040).
    canonical_sense: >-
      "Scope" in eulogikon is about CORPUS COVERAGE, not retrieval. NOTE (cross-repo):
      the sister repo EuGraphikon binds "scope" to a DIFFERENT referent (the set of
      collections a retrieval role searches). Adjacent repos, one signifier, two
      referents — EuGraphikon must qualify as `retrieval_scope` to avoid the
      collision. Flagged by EuGraphikon/scripts/check_shared_vocabulary.py.
    owner: {domain: TXT, file: docs/specification/doctrine/no_per_case_patching.md}
    status: aligned
    polysemy_debt:
      has_debt: false
      kind: clean-but-cross-repo-adjacent
      cause: One referent within eulogikon (corpus coverage); the cross-repo clash with EuGraphikon's retrieval-scope is the importer's to disambiguate.
    cites: [CDP-040]

  qualifier_head:
    signifier_form: [qualifier_head, "Qualifier-Head"]
    canonical_referent: >-
      The database-identifier naming grammar (CDP-056 / §56): every schema, table,
      column, and key reads `{qualifier...}_{head}` — the head a baptised subject
      registered here, each qualifier a registered referent narrowing it. The
      noun-grammar dual of CDP-051 (Subject-Verb-Object). The name reconstructs
      referent + role without reading the DDL.
    canonical_sense: >-
      Two tests both pass: the head is a baptised subject and every token resolves
      to one referent (declares); no `db_wrapper_denylist` member is the head or a
      standalone grain, and no mechanism word sits at the head (no empty wrapper).
      Permutation diagnostic decides void names (segment_unit ~ unit_segment).
      Mirror of EuGraphikon's EUG-044 — one rule, family-wide. Held review-gate;
      the EuKoine-pinned corpus-contract guardian flags failing live-schema identifiers.
    owner: {domain: TXT, file: docs/governance/cdp_registry.yaml}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent — the DB naming grammar of CDP-056.}
    cites: [CDP-051, CDP-055, CDP-056]

  db_wrapper_denylist:
    signifier_form: [db_wrapper_denylist]
    canonical_referent: >-
      The closed set of empty wrapper nouns forbidden (CDP-056) as a database
      identifier head or standalone grain — each answers "X of what?" with no
      referent (CDP-055 free-floating): unit, segment, ref, item, object, entry,
      record, data, value, info, thing, element, part, piece, portion, span. Plus
      the mechanism words forbidden at the head: base, dao, handler, manager,
      provider, app, schema.
    canonical_sense: >-
      Several members are already retired in their own right (unit ->
      SID/RID, ADR-017; segment, ADR-017; ref -> legacy_reference,
      ADR-014). This entry generalises the ban to the database-naming surface. A
      registered baptised head whose final token historically was a wrapper but
      which as a whole binds its referent (legacy_reference) is NOT a violation —
      the ban is on the BARE wrapper as head. A SECOND exception (CDP-056
      declared-polymorphic-table): a {subject}_-qualified wrapper column
      ({subject}_value / {subject}_scheme / {subject}_class) in a table DECLARED
      polymorphic with a mandatory {subject}_kind discriminator over a closed,
      registered kind-set is NOT a violation — the discriminator supplies the
      referent at row grain (overlay_value <- overlay_kind). A bare or
      non-discriminated value / scheme column remains banned.
    owner: {domain: TXT, file: docs/governance/cdp_registry.yaml}
    status: retired
    polysemy_debt: {has_debt: false, kind: clean-after-retirement, cause: Closed denylist of empty wrappers; CDP-056.}
    cites: [CDP-055, CDP-056]

  embedding:
    signifier_form: [embedding]
    canonical_referent: >-
      The vector representation of an addressed Greek thing (a SID, or an RID
      range) for similarity search — `eulogikon.units_index.embedding` (pgvector).
      A baptised CDP-056 head: `{sid|rid}_embedding` reads "the vector of that
      SID/RID".
    canonical_sense: >-
      A legitimate head (answers "what is this?": a vector). Distinct from the
      thing embedded (the SID/RID) and from the model that produced it.
    owner: {domain: TXT, file: cluster-corpus-database/src/database_cluster/ddl/schema_v2.sql}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent — the vector of an addressed thing.}
    cites: [CDP-056]

  citation_unit:
    signifier_form: [citation_unit, CitationUnit]
    canonical_referent: >-
      IL[1] of a work's source-declared citation hierarchy: the NAMED GRAIN the
      edition's reference scheme counts in (Fragment / Page / Section / Epigram /
      Entry / Stephanus page / Book / ...). Derived from — never independent of —
      the registered `citation_level_labels` list: `citation_unit == citation_level_labels[1]`
      (falling back to [0] for a single-level work). Emitted as the `citation_unit`
      attribute of the `<citation_scheme>` element on every resolved_source record.
    canonical_sense: >-
      A QUALIFIED signifier, and legitimate as such: it says what it is a unit OF
      (the citation), unlike the bare `unit` that CDP-055 retires as free-floating.
      Registered here because it CROSSES A BOUNDARY (Go struct -> XML attribute ->
      the emitted store and the structure cards) and an unbaptised boundary-crossing
      name is a CDP-051 violation regardless of how clear it reads. It is a
      DERIVED VIEW of `citation_level_labels`, never a second source of that fact:
      both are read from the one `var IL = [...]` declaration in the russians-layer
      God Source, whose reading is owned by that entry. Independent evidence of a
      work's form (a triangulation cross-check against form_family/structure), never
      an authority over it. CDP-051 head: the subject is the `unit` grain, qualified
      `citation`; the head is conserved from `citation_level_labels`' own wording.
    owner: {domain: decode, file: cluster_god_sources_v6_csv_grid/decode_god_sources_xml_reader/decode.go}
    status: aligned
    polysemy_debt:
      has_debt: false
      kind: clean
      cause: >-
        The Go reader's internal field is renamed to `CitationLevelLabels`, matching
        the registered `citation_level_labels` head. Both readers (Go tokenizer and
        Python regex) still read the one immutable `var IL = [...]` God Source; the
        single-level fallback (`len(levels)==1 → levels[0]` in `citationUnit`) is
        documented as the contract for flat works and is now shared knowledge.
    cites: [CDP-006, CDP-050, CDP-051, CDP-055, CDP-060]

  citation_level_labels:
    signifier_form: [citation_level_labels]
    canonical_referent: >-
      The ordered list of source-declared citation-level names for a work,
      extracted from the `var IL = [...]` array in the russians-layer source HTML.
      IL[0] is always "Line" (the finest level); IL[1] is the citation unit
      (Fragment / Page / Section / Epigram / Entry / Stephanus page / ...);
      IL[2+] are coarser (Book / Volume / Play). Stored at the `source` level of
      the provenance index, sibling to `edition`.
    canonical_sense: >-
      Materialises the source's citation-hierarchy declaration so consumers know
      the semantic NAME of each hierarchy level without re-reading the HTML.
      Distinct from `edition.citation_style`, which carries only the format string
      and `hierarchy_depth` (a count) — the labels are not recoverable from the
      depth. The citation unit (IL[1]) is independent evidence of a work's form,
      a triangulation cross-check against form_family/structure, never an
      authority over it.
    owner: {domain: provenance, file: scripts/provenance/build_provenance_index.py}
    status: aligned
    polysemy_debt: {has_debt: false, kind: clean, cause: One referent — the source-declared citation-level labels.}
    cites: [CDP-006, CDP-049, CDP-051, INV-MD-08]

  doxography:
    signifier_form: [doxography]
    canonical_referent: >-
      A work-level form_family (ADR-018 §2, 21-family locked list): the genre of
      reports of philosophers' doctrines+writings — the Placita tradition (Aëtius,
      ps-Plutarch), Theophrastus' founding Physikōn doxai, Arius Didymus, and the
      Diels-Kranz testimony sections. The value stored in
      eulogikon.works.form_family / authors.form_family.
    canonical_sense: >-
      One referent, one role: doxography is a form_family ONLY. It was formerly a
      form_type leaf under `compilation`; that leaf is RETIRED (CDP-006/CDP-051
      bijection — a signifier may not be both a family and a sub-kind). Distinct
      from `biography` (reports of lives) and from `compilation` (gatherings of
      excerpts: florilegium/anthology) and from `paradoxography` (reports of
      marvels — a different genre that merely shares the 'doxograph' substring and
      stays a compilation form_type).
    owner: {domain: TXT, file: scripts/audit/check_classification_coherence.py}
    status: aligned
    polysemy_debt: {has_debt: false, kind: resolved, cause: form_type leaf retired on promotion to family (2026-06-23); one referent.}
    cites: [ADR-018, CDP-006, CDP-051]

  decode_closure_record:
    signifier_form: [decode_closure_record, closure record]
    canonical_referent: >-
      The machine-derived, non-forgeable proof that the God-source decode closure
      gates were run at a checkpoint —
      `cluster_god_sources_v6_csv_grid/decode_god_sources_xml_data/decode_closure_record.json`, written solely by
      decode_check_closure.py. Content-addressed by the freshness triple
      (legend_hash, reader_source_hash, gate_scripts_hash); carries the gate exit
      codes and any open blocking_findings; no timestamp (the triple is identity).
    canonical_sense: >-
      One referent: the committed record IS the checkpoint proof. `--verify`
      re-derives the triple and diffs, so a missing or stale record is a provable
      skip, never an agent's prose claim. DISTINCT from the resolved_source
      `exception_ledger` (a closure register of works that could not be decoded,
      each with a stated reason — a T3 concern) and from a coverage table (an
      ephemeral read-model tabulation). The two must not merge (CDP-051 bijection).
