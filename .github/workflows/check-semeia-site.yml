name: Check Semeia site

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify posts manifest, index, and sitemap stay in sync
        run: python scripts/sync_semeia_site.py --check
