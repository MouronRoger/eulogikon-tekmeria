# IndexNow for tekmeria.eulogikon.org.
#
# Submits ONLY published essay URLs from posts.json. Never the index page,
# assets, drafts, or any non-post path.
#
# Runs on push to main only when the HEAD commit message contains [indexnow].
# Manual runs can submit every registered post.
#
# Setup:
#   1. Repository secret INDEXNOW_KEY = the key string (same as the live
#      /<key>.txt verification file on the published site root).
#   2. To submit changed published posts: include [indexnow] in the commit
#      message on main.
#   3. To submit all published posts: Actions → indexnow → Run workflow.
#
# Best-effort: IndexNow failures are logged but do not fail the build.

name: indexnow

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      submit_all:
        description: "Submit all published posts from posts.json"
        type: boolean
        default: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to submit
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          SUBMIT_ALL: ${{ github.event.inputs.submit_all }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$SUBMIT_ALL" == "true" ]]; then
              echo "mode=all-posts" >> "$GITHUB_OUTPUT"
              echo "Manual run: submit all published posts"
            else
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "Manual run with submit_all=false — nothing to do"
            fi
            exit 0
          fi

          msg=$(git log -1 --format='%B' "${{ github.sha }}")
          if echo "$msg" | grep -qF '[indexnow]'; then
            echo "mode=diff" >> "$GITHUB_OUTPUT"
            echo "Commit message contains [indexnow] — submit changed posts"
          else
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "No [indexnow] flag — submissions off by default"
          fi

      - name: Set up Python
        if: steps.gate.outputs.mode != 'skip'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Submit published post URLs to IndexNow
        if: steps.gate.outputs.mode != 'skip'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          MODE: ${{ steps.gate.outputs.mode }}
        run: |
          if [[ -z "$INDEXNOW_KEY" ]]; then
            echo "INDEXNOW_KEY secret is not set — skipping"
            exit 0
          fi

          if [[ "$MODE" == "all-posts" ]]; then
            python .github/scripts/indexnow_submit.py --all-posts \
              || echo "IndexNow submission reported errors (non-fatal)"
            exit 0
          fi

          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "first push on branch — skipping IndexNow submission"
            exit 0
          fi

          python .github/scripts/indexnow_submit.py \
            --base "$BEFORE_SHA" \
            --head "$AFTER_SHA" \
            || echo "IndexNow submission reported errors (non-fatal)"
